<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <title>Control de Deportes y Zócalos PRO</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #1f6feb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }

        .tabs { display: flex; background: #010409; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #8b949e; border-bottom: 2px solid transparent; font-size: 12px; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); background: var(--card); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }

        .team-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        .color-group { display: flex; gap: 5px; margin-bottom: 8px; justify-content: center; }
        input[type="color"] { width: 30px; height: 30px; border: none; border-radius: 4px; background: none; cursor: pointer; padding: 0; }

        input[type="text"], input[type="number"], select, textarea { width: 100%; background: #010409; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; font-weight: bold; }
        input[type="text"], input[type="number"] { text-align: center; }
        input[type="range"] { width: 100%; margin: 8px 0; accent-color: var(--accent); }

        .score-box { font-size: 28px; font-weight: bold; padding: 5px 15px; border-radius: 8px; min-width: 70px; text-align: center; transition: 0.3s; border: 1px solid var(--accent); color: var(--accent); }

        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 8px; }
        .btn-gol { background: #238636; color: white; }
        .btn-minus { background: #da3633; color: white; }
        .btn-blue { background: var(--accent); color: white; }

        .switch-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #238636; }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-bar { position: fixed; bottom: 0; width: 100%; display: none; gap: 10px; padding: 15px; background: #0d1117; box-sizing: border-box; border-top: 1px solid var(--border); z-index: 100; }
        label { font-size: 10px; color: #8b949e; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }

        details.section { background: rgba(15,23,42,0.35); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
        details.section summary { cursor: pointer; padding: 14px 16px; font-weight: 900; text-transform: uppercase; font-size: 12px; color: #e2e8f0; background: #161b22; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .section-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; text-align: left; }

        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-z { padding: 10px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; color: white; background: #334155; transition: 0.2s; }
        .btn-z.active { background: #22c55e; color: #08111f; }

        .input-group { background: #010409; padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">DEPORTES</div>
        <div class="tab" onclick="switchTab(1)">ZÓCALO</div>
        <div class="tab" onclick="switchTab(2)">WEBRTC</div>
        <div class="tab" onclick="switchTab(3)">PLAYLIST</div>
    </div>

    <div class="container">
        <div id="tab-deportes" class="tab-content active">
            <div class="card">
                <div class="team-row" id="teams-ui-row">
                    <div id="ui-local">
                        <div class="color-group">
                            <input type="color" id="bg-l" value="#0000FF" oninput="updateAll()">
                            <input type="color" id="txt-l" value="#FFFFFF" oninput="updateAll()">
                        </div>
                        <label id="label-l">LOCAL</label>
                        <input type="text" id="name-l" value="ALIANZA" oninput="updateAll()">
                        <input type="text" id="logo-l" placeholder="+ LOGO URL" style="margin-top:5px; font-size:9px;" oninput="updateAll()">
                    </div>

                    <div style="text-align: center;">
                        <div class="score-box" id="display-score">0 - 0</div>
                        <div class="color-group" style="margin-top:8px;">
                            <input type="color" id="bg-score-global" value="#1f6feb" oninput="updateAll()">
                            <input type="color" id="txt-score-global" value="#FFFFFF" oninput="updateAll()">
                        </div>
                    </div>

                    <div id="ui-visita">
                        <div class="color-group">
                            <input type="color" id="bg-v" value="#FFFF00" oninput="updateAll()">
                            <input type="color" id="txt-v" value="#000000" oninput="updateAll()">
                        </div>
                        <label id="label-v">VISITA</label>
                        <input type="text" id="name-v" value="UNIVERSITARIO" oninput="updateAll()">
                        <input type="text" id="logo-v" placeholder="+ LOGO URL" style="margin-top:5px; font-size:9px;" oninput="updateAll()">
                    </div>
                </div>

                <div class="team-row" style="margin-top:10px;" id="btns-ui-row">
                    <div id="btns-l">
                        <button class="btn btn-gol" onclick="changeScore('l', 1)">+ GOL</button>
                        <button class="btn btn-minus" onclick="changeScore('l', -1)">-1</button>
                    </div>
                    <div></div>
                    <div id="btns-v">
                        <button class="btn btn-gol" onclick="changeScore('v', 1)">+ GOL</button>
                        <button class="btn btn-minus" onclick="changeScore('v', -1)">-1</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; text-align: center;">
                    <div style="flex:1">
                        <label>TIEMPO BASE</label>
                        <input type="number" id="limit-min" value="45" oninput="updateAll()">
                        <div class="color-group" style="margin-top:5px;">
                            <input type="color" id="bg-clock" value="#1a1a1a" oninput="updateAll()">
                            <input type="color" id="txt-clock" value="#FFFFFF" oninput="updateAll()">
                        </div>
                    </div>
                    <div style="flex:1">
                        <label>PERIODO</label>
                        <div class="switch-container">
                            <span style="font-size:11px; font-weight:bold;">1T</span>
                            <label class="switch">
                                <input type="checkbox" id="period-toggle" onchange="handlePeriodChange()">
                                <span class="slider"></span>
                            </label>
                            <span style="font-size:11px; font-weight:bold;">2T</span>
                        </div>
                    </div>
                    <div style="flex:1">
                        <label>EXTRA (+MIN)</label>
                        <input type="number" id="extra-min" value="0" oninput="updateAll()">
                        <div class="color-group" style="margin-top:5px;">
                            <input type="color" id="bg-extra" value="#FF0000" oninput="updateAll()">
                            <input type="color" id="txt-extra" value="#FFFFFF" oninput="updateAll()">
                        </div>
                    </div>
                </div>
                <button class="btn btn-blue" style="margin-top:15px;" onclick="sendClock('start')">INICIAR / REANUDAR</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:#30363d; color:white; flex:1;" onclick="sendClock('stop')">PAUSAR</button>
                    <button class="btn" style="background:#da3633; color:white; flex:1;" onclick="resetFull()">RESET TOTAL</button>
                </div>
            </div>
        </div>

        <div id="tab-zocalo" class="tab-content">
            <details class="section" open>
                <summary><span>CONFIGURACIÓN DE CINTILLO</span></summary>
                <div class="section-body">
                    <button class="btn-z" id="btn-z-lt" onclick="toggleZocalo('lt')">MOSTRAR / OCULTAR CINTILLO</button>

                    <div class="grid2">
                        <div>
                            <label>ESTILO VISUAL</label>
                            <select id="z-style" onchange="updateZocalo()">
                                <option value="tv-sport">📺 TV SPORT (NUEVO)</option>
                                <option value="modern">MODERN</option>
                                <option value="glass">GLASS</option>
                                <option value="neon">NEON</option>
                                <option value="box">BOX</option>
                                <option value="ribbon">RIBBON</option>
                                <option value="clean">CLEAN</option>
                                <option value="premium">PREMIUM</option>
                                <option value="capsule">CAPSULE</option>
                                <option value="underline">UNDERLINE</option>
                            </select>
                        </div>
                        <div>
                            <label>COLOR PRINCIPAL</label>
                            <input type="color" id="z-color" value="#ffcc00" style="height:38px; width:100%;" oninput="updateZocalo()">
                        </div>
                    </div>

                    <label>TÍTULO PRINCIPAL</label>
                    <input type="text" id="z-title" value="OSCAR ABAD" oninput="updateZocalo()">

                    <label>SUBTÍTULO / CARGO</label>
                    <input type="text" id="z-sub" value="DIRECTOR TÉCNICO" oninput="updateZocalo()">

                    <div class="input-group">
                        <label>TAMAÑO DEL CINTILLO</label>
                        <input type="range" id="z-scale" min="50" max="150" value="100" oninput="updateZocalo()">
                    </div>
                </div>
            </details>

            <details class="section">
                <summary><span>EXTRAS Y LOGOS</span></summary>
                <div class="section-body">
                    <div style="display:flex; gap:5px; flex-wrap:wrap;">
                        <button class="btn-z active" id="btn-z-live" onclick="toggleZocalo('live')">VIVO</button>
                        <button class="btn-z active" id="btn-z-clock" onclick="toggleZocalo('clock')">RELOJ</button>
                        <button class="btn-z" id="btn-z-logo" onclick="toggleZocalo('logo')">LOGOTIPO</button>
                        <button class="btn-z" id="btn-z-social" onclick="toggleZocalo('social')">RED SOCIAL</button>
                    </div>

                    <div class="input-group" style="margin-top: 10px;">
                        <label style="color:#fff;">CONFIGURACIÓN DE LOGOTIPO</label>
                        <input type="text" id="z-logo-url" placeholder="URL LOGO IMAGEN" oninput="updateZocalo()" style="margin-bottom:8px;">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div>
                                <label>TAMAÑO LOGO</label>
                                <input type="range" id="z-logo-size" min="30" max="250" value="80" oninput="updateZocalo()">
                            </div>
                            <div>
                                <label>POSICIÓN</label>
                                <select id="z-logo-pos" onchange="updateZocalo()">
                                    <option value="tr">Sup. Derecho</option>
                                    <option value="tl">Sup. Izquierdo</option>
                                    <option value="br">Inf. Derecho</option>
                                    <option value="bl">Inf. Izquierdo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label style="color:#fff;">CONFIGURACIÓN DE RED SOCIAL</label>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div>
                                <label>RED SOCIAL</label>
                                <select id="z-soc-net" onchange="updateZocalo()">
                                    <option value="instagram">Instagram</option>
                                    <option value="twitter">X / Twitter</option>
                                    <option value="youtube">YouTube</option>
                                    <option value="facebook">Facebook</option>
                                    <option value="tiktok">TikTok</option>
                                </select>
                            </div>
                            <div>
                                <label>USUARIO</label>
                                <input type="text" id="z-soc-handle" value="@usuario" oninput="updateZocalo()">
                            </div>
                        </div>
                        <div>
                            <label>TAMAÑO DE REDES</label>
                            <input type="range" id="z-soc-size" min="50" max="150" value="100" oninput="updateZocalo()">
                        </div>
                    </div>
                </div>
            </details>

            <details class="section">
                <summary><span>NOTICIAS (CRAWL)</span></summary>
                <div class="section-body">
                    <button class="btn-z" id="btn-z-ticker" onclick="toggleZocalo('ticker')">ACTIVAR TICKER</button>
                    <textarea id="z-ticker-text" rows="3" oninput="updateZocalo()">ÚLTIMO MINUTO: Bienvenidos a la transmisión oficial...</textarea>
                    <div class="input-group">
                        <label>VELOCIDAD DEL TEXTO (Rápido -> Lento)</label>
                        <input type="range" id="z-ticker-speed" min="5" max="60" value="25" oninput="updateZocalo()">
                    </div>
                </div>
            </details>
        </div>

        <div id="tab-webrtc" class="tab-content"><div class="card">Próximamente...</div></div>
        <div id="tab-playlist" class="tab-content"><div class="card">Próximamente...</div></div>
    </div>

    <div class="action-bar" id="sports-actions">
        <button class="btn btn-gol" style="flex:1" onclick="sendUI('show')">MOSTRAR MARCADOR</button>
        <button class="btn btn-minus" style="flex:1" onclick="sendUI('hide')">OCULTAR MARCADOR</button>
    </div>

    <div class="action-bar" id="zocalo-actions">
        <button class="btn btn-gol" style="flex:1" onclick="bulkZocalo(true)">MOSTRAR ZÓCALOS</button>
        <button class="btn btn-minus" style="flex:1" onclick="bulkZocalo(false)">OCULTAR ZÓCALOS</button>
    </div>

    <script>
        const ID_UNICO = "marcador_oscar_pro_2024";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        let state = { scoreL: 0, scoreV: 0 };

        function defaultZState() {
            return {
                lt: { visible: false, title: "OSCAR ABAD", subtitle: "DIRECTOR TÉCNICO", color: "#ffcc00", scale: 100, style: "tv-sport" },
                ticker: { visible: false, text: "ÚLTIMO MINUTO: Bienvenidos a la transmisión oficial...", speed: 25 },
                logo: { visible: false, url: "", size: 80, pos: "tr" },
                bug: { showLive: true, showClock: true },
                social: { visible: false, net: "instagram", handle: "@usuario", size: 100 }
            };
        }

        let zState = defaultZState();

        client.on('connect', () => {
            console.log("Conectado a MQTT");
            client.subscribe(ID_UNICO);
            updateAll();
            updateZocalo();
        });

        window.onload = () => {
            loadSavedData();
            updateScoreDisplay();
            updateAll();
            updateZocalo();
        };

        function switchTab(index) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach((t, i) => t.classList.toggle('active', i === index));
            contents.forEach((c, i) => c.classList.toggle('active', i === index));
            document.getElementById('sports-actions').style.display = index === 0 ? 'flex' : 'none';
            document.getElementById('zocalo-actions').style.display = index === 1 ? 'flex' : 'none';
        }

        function mergeZState(base, incoming) {
            return {
                ...base,
                ...incoming,
                lt: { ...base.lt, ...(incoming?.lt || {}) },
                ticker: { ...base.ticker, ...(incoming?.ticker || {}) },
                logo: { ...base.logo, ...(incoming?.logo || {}) },
                bug: { ...base.bug, ...(incoming?.bug || {}) },
                social: { ...base.social, ...(incoming?.social || {}) }
            };
        }

        function saveData() {
            const currentData = {
                scoreL: state.scoreL,
                scoreV: state.scoreV,
                nameL: document.getElementById('name-l').value,
                nameV: document.getElementById('name-v').value,
                logoL: document.getElementById('logo-l').value,
                logoV: document.getElementById('logo-v').value,
                bgL: document.getElementById('bg-l').value,
                txtL: document.getElementById('txt-l').value,
                bgV: document.getElementById('bg-v').value,
                txtV: document.getElementById('txt-v').value,
                bgScore: document.getElementById('bg-score-global').value,
                txtScore: document.getElementById('txt-score-global').value,
                bgClock: document.getElementById('bg-clock').value,
                txtClock: document.getElementById('txt-clock').value,
                bgExtra: document.getElementById('bg-extra').value,
                txtExtra: document.getElementById('txt-extra').value,
                limit: document.getElementById('limit-min').value,
                extra: document.getElementById('extra-min').value,
                period: document.getElementById('period-toggle').checked,
                zState: zState
            };
            localStorage.setItem(ID_UNICO + '_storage', JSON.stringify(currentData));
        }

        function loadSavedData() {
            const saved = localStorage.getItem(ID_UNICO + '_storage');
            if (!saved) return;

            const d = JSON.parse(saved);

            state.scoreL = d.scoreL ?? 0;
            state.scoreV = d.scoreV ?? 0;

            document.getElementById('name-l').value = d.nameL ?? document.getElementById('name-l').value;
            document.getElementById('name-v').value = d.nameV ?? document.getElementById('name-v').value;
            document.getElementById('logo-l').value = d.logoL ?? "";
            document.getElementById('logo-v').value = d.logoV ?? "";
            document.getElementById('bg-l').value = d.bgL ?? "#0000FF";
            document.getElementById('txt-l').value = d.txtL ?? "#FFFFFF";
            document.getElementById('bg-v').value = d.bgV ?? "#FFFF00";
            document.getElementById('txt-v').value = d.txtV ?? "#000000";
            document.getElementById('bg-score-global').value = d.bgScore ?? "#1f6feb";
            document.getElementById('txt-score-global').value = d.txtScore ?? "#FFFFFF";
            document.getElementById('bg-clock').value = d.bgClock ?? "#1a1a1a";
            document.getElementById('txt-clock').value = d.txtClock ?? "#FFFFFF";
            document.getElementById('bg-extra').value = d.bgExtra ?? "#FF0000";
            document.getElementById('txt-extra').value = d.txtExtra ?? "#FFFFFF";
            document.getElementById('limit-min').value = d.limit ?? 45;
            document.getElementById('extra-min').value = d.extra ?? 0;
            document.getElementById('period-toggle').checked = !!d.period;

            if (d.zState) {
                zState = mergeZState(defaultZState(), d.zState);

                document.getElementById('z-title').value = zState.lt.title ?? "";
                document.getElementById('z-sub').value = zState.lt.subtitle ?? "";
                document.getElementById('z-style').value = zState.lt.style ?? "tv-sport";
                document.getElementById('z-color').value = zState.lt.color ?? "#ffcc00";
                document.getElementById('z-scale').value = zState.lt.scale ?? 100;

                document.getElementById('z-ticker-text').value = zState.ticker.text ?? "";
                document.getElementById('z-ticker-speed').value = zState.ticker.speed ?? 25;

                document.getElementById('z-logo-url').value = zState.logo.url ?? "";
                document.getElementById('z-logo-size').value = zState.logo.size ?? 80;
                document.getElementById('z-logo-pos').value = zState.logo.pos ?? "tr";

                document.getElementById('z-soc-net').value = zState.social.net ?? "instagram";
                document.getElementById('z-soc-handle').value = zState.social.handle ?? "@usuario";
                document.getElementById('z-soc-size').value = zState.social.size ?? 100;

                document.getElementById('btn-z-lt').classList.toggle('active', !!zState.lt.visible);
                document.getElementById('btn-z-ticker').classList.toggle('active', !!zState.ticker.visible);
                document.getElementById('btn-z-logo').classList.toggle('active', !!zState.logo.visible);
                document.getElementById('btn-z-live').classList.toggle('active', !!zState.bug.showLive);
                document.getElementById('btn-z-clock').classList.toggle('active', !!zState.bug.showClock);
                document.getElementById('btn-z-social').classList.toggle('active', !!zState.social.visible);
            }

            updateScoreDisplay();
            handlePeriodChange(true);
        }

        function changeScore(team, val) {
            if (team === 'l') state.scoreL = Math.max(0, state.scoreL + val);
            if (team === 'v') state.scoreV = Math.max(0, state.scoreV + val);
            updateScoreDisplay();
            updateAll();
        }

        function updateScoreDisplay() {
            const is2T = document.getElementById('period-toggle').checked;
            const scoreLabel = is2T ? `${state.scoreV} - ${state.scoreL}` : `${state.scoreL} - ${state.scoreV}`;
            const display = document.getElementById('display-score');
            display.innerText = scoreLabel;
            display.style.backgroundColor = document.getElementById('bg-score-global').value;
            display.style.color = document.getElementById('txt-score-global').value;
            display.style.borderColor = document.getElementById('txt-score-global').value;
        }

        function handlePeriodChange(isLoad = false) {
            const is2T = document.getElementById('period-toggle').checked;
            const rowTeams = document.getElementById('teams-ui-row');
            const rowBtns = document.getElementById('btns-ui-row');

            if (is2T) {
                rowTeams.style.flexDirection = 'row-reverse';
                rowBtns.style.flexDirection = 'row-reverse';
                document.getElementById('label-l').innerText = "VISITA (2T)";
                document.getElementById('label-v').innerText = "LOCAL (2T)";
            } else {
                rowTeams.style.flexDirection = 'row';
                rowBtns.style.flexDirection = 'row';
                document.getElementById('label-l').innerText = "LOCAL";
                document.getElementById('label-v').innerText = "VISITA";
            }

            if (!isLoad) sendClock('reset');
            updateScoreDisplay();
            updateAll();
        }

        function resetFull() {
            if (confirm("¿Deseas resetear todo el marcador y la memoria?")) {
                localStorage.removeItem(ID_UNICO + '_storage');
                location.reload();
            }
        }

        function updateAll() {
            const is2T = document.getElementById('period-toggle').checked;
            let data = {
                nameL: is2T ? document.getElementById('name-v').value : document.getElementById('name-l').value,
                nameV: is2T ? document.getElementById('name-l').value : document.getElementById('name-v').value,
                scoreL: is2T ? state.scoreV : state.scoreL,
                scoreV: is2T ? state.scoreL : state.scoreV,
                logoL: is2T ? document.getElementById('logo-v').value : document.getElementById('logo-l').value,
                logoV: is2T ? document.getElementById('logo-l').value : document.getElementById('logo-v').value,
                bgL: is2T ? document.getElementById('bg-v').value : document.getElementById('bg-l').value,
                txtL: is2T ? document.getElementById('txt-v').value : document.getElementById('txt-l').value,
                bgV: is2T ? document.getElementById('bg-l').value : document.getElementById('bg-v').value,
                txtV: is2T ? document.getElementById('txt-l').value : document.getElementById('txt-v').value,
                bgScore: document.getElementById('bg-score-global').value,
                txtScore: document.getElementById('txt-score-global').value,
                limit: document.getElementById('limit-min').value,
                extra: document.getElementById('extra-min').value,
                periodText: is2T ? "2T" : "1T",
                bgClock: document.getElementById('bg-clock').value,
                txtClock: document.getElementById('txt-clock').value,
                bgExtra: document.getElementById('bg-extra').value,
                txtExtra: document.getElementById('txt-extra').value
            };

            client.publish(ID_UNICO, JSON.stringify({ type: 'update_info', data: data }));
            updateScoreDisplay();
            saveData();
        }

        function sendClock(cmd) {
            client.publish(ID_UNICO, JSON.stringify({ type: 'control_clock', data: { command: cmd } }));
        }

        function sendUI(action) {
            client.publish(ID_UNICO, JSON.stringify({ type: 'control_ui', data: { action: action } }));
        }

        function toggleZocalo(element) {
            if (element === 'lt') zState.lt.visible = !zState.lt.visible;
            if (element === 'ticker') zState.ticker.visible = !zState.ticker.visible;
            if (element === 'logo') zState.logo.visible = !zState.logo.visible;
            if (element === 'live') zState.bug.showLive = !zState.bug.showLive;
            if (element === 'clock') zState.bug.showClock = !zState.bug.showClock;
            if (element === 'social') zState.social.visible = !zState.social.visible;

            const btn = document.getElementById('btn-z-' + element);
            if (btn) btn.classList.toggle('active');

            updateZocalo();
        }

        function bulkZocalo(v) {
            zState.lt.visible = v;
            zState.ticker.visible = v;
            zState.logo.visible = v;
            zState.bug.showLive = v;
            zState.bug.showClock = v;
            zState.social.visible = v;

            ['lt', 'ticker', 'logo', 'live', 'clock', 'social'].forEach(id => {
                const btn = document.getElementById('btn-z-' + id);
                if (btn) {
                    if (v) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });

            updateZocalo();
        }

        function updateZocalo() {
            zState.lt.title = document.getElementById('z-title').value;
            zState.lt.subtitle = document.getElementById('z-sub').value;
            zState.lt.color = document.getElementById('z-color').value;
            zState.lt.style = document.getElementById('z-style').value;
            zState.lt.scale = Number(document.getElementById('z-scale').value) || 100;

            zState.ticker.text = document.getElementById('z-ticker-text').value;
            zState.ticker.speed = Number(document.getElementById('z-ticker-speed').value) || 25;

            zState.logo.url = document.getElementById('z-logo-url').value;
            zState.logo.size = Number(document.getElementById('z-logo-size').value) || 80;
            zState.logo.pos = document.getElementById('z-logo-pos').value;

            zState.social.net = document.getElementById('z-soc-net').value;
            zState.social.handle = document.getElementById('z-soc-handle').value;
            zState.social.size = Number(document.getElementById('z-soc-size').value) || 100;

            client.publish(ID_UNICO, JSON.stringify({ type: 'zocalo_update', data: zState }));
            saveData();
        }
    </script>
</body>
</html>
