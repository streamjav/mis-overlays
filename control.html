<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Overlays</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .panel { background: #1e1e1e; border-radius: 12px; padding: 20px; max-width: 400px; margin: auto; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border-radius: 6px; border: 1px solid #333; background: #252525; color: white;
            box-sizing: border-box;
        }
        .btn-group { display: flex; gap: 10px; }
        button { 
            flex: 1; padding: 15px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #e74c3c; color: white; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Control de Zócalo</h2>
        
        <label>Título:</label>
        <input type="text" id="title" placeholder="Ej: GOOOL DE MESSI">
        
        <label>Subtítulo:</label>
        <input type="text" id="sub" placeholder="Ej: Minuto 23'">
        
        <label>Color de Acento:</label>
        <input type="color" id="color" value="#e74c3c">

        <div class="btn-group">
            <button class="btn-on" onclick="send('show')">MOSTRAR</button>
            <button class="btn-off" onclick="send('hide')">OCULTAR</button>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('overlay_channel');

        function send(action) {
            bc.postMessage({
                action: action,
                title: document.getElementById('title').value,
                sub: document.getElementById('sub').value,
                color: document.getElementById('color').value
            });
        }
    </script>
</body>
</html>
