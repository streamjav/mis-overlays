<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <title>MASTER CONTROL - Deportes & Zócalos</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #1f6feb; --success: #238636; --danger: #da3633; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Sistema de Pestañas */
        .tabs { display: flex; background: #010409; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); background: var(--card); }
        .tab-content { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .tab-content.active { display: block; }

        /* Estilos Comunes */
        .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
        label { font-size: 10px; color: #8b949e; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; background: #010409; border: 1px solid var(--border); color: white; padding: 10px; 
            border-radius: 6px; box-sizing: border-box; font-size: 14px; 
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px; color: white; }
        .btn-show { background: var(--success); }
        .btn-hide { background: var(--danger); }
        .btn-blue { background: var(--accent); }
        .btn-gray { background: #30363d; }
        
        .color-group { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        input[type="color"] { width: 30px; height: 30px; border: none; border-radius: 4px; background: none; cursor: pointer; padding: 0; }

        /* Switch Estilo */
        .switch-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Barra Inferior Fija */
        .action-bar { position: fixed; bottom: 0; width: 100%; display: flex; gap: 10px; padding: 15px; background: #0d1117; box-sizing: border-box; border-top: 1px solid var(--border); z-index: 1000; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'tab-deportes')">DEPORTES</div>
        <div class="tab" onclick="openTab(event, 'tab-zocalos')">ZÓCALOS</div>
        <div class="tab">WEBRTC</div>
        <div class="tab">PLAYLIST</div>
    </div>

    <div id="tab-deportes" class="tab-content active">
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;">
                <div style="text-align: center;">
                    <div class="color-group">
                        <input type="color" id="bg-l" value="#0000FF" oninput="updateSports()">
                        <input type="color" id="txt-l" value="#FFFFFF" oninput="updateSports()">
                    </div>
                    <label>LOCAL</label>
                    <input type="text" id="name-l" value="ALIANZA" oninput="updateSports()">
                    <input type="text" id="logo-l" placeholder="+ LOGO URL" style="margin-top:5px; font-size:10px;" oninput="updateSports()">
                </div>
                <div style="font-size: 24px; font-weight: bold; color: var(--accent);" id="display-score">0 - 0</div>
                <div style="text-align: center;">
                    <div class="color-group">
                        <input type="color" id="bg-v" value="#FFFF00" oninput="updateSports()">
                        <input type="color" id="txt-v" value="#000000" oninput="updateSports()">
                    </div>
                    <label>VISITA</label>
                    <input type="text" id="name-v" value="UNIVERSITARIO" oninput="updateSports()">
                    <input type="text" id="logo-v" placeholder="+ LOGO URL" style="margin-top:5px; font-size:10px;" oninput="updateSports()">
                </div>
            </div>
            <div class="grid-2" style="margin-top:15px;">
                <div>
                    <button class="btn btn-show" onclick="changeScore('l', 1)">+ GOL</button>
                    <button class="btn btn-hide" onclick="changeScore('l', -1)">-1</button>
                </div>
                <div>
                    <button class="btn btn-show" onclick="changeScore('v', 1)">+ GOL</button>
                    <button class="btn btn-hide" onclick="changeScore('v', -1)">-1</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="grid-3" style="text-align: center;">
                <div>
                    <label>TIEMPO BASE</label>
                    <input type="number" id="limit-min" value="45" oninput="updateSports()">
                    <div class="color-group" style="margin-top:5px;">
                        <input type="color" id="bg-clock" value="#FFFFFF" oninput="updateSports()">
                        <input type="color" id="txt-clock" value="#000000" oninput="updateSports()">
                    </div>
                </div>
                <div>
                    <label>PERIODO</label>
                    <div class="color-group">
                        <input type="color" id="bg-p" value="#FF0000" oninput="updateSports()">
                        <input type="color" id="txt-p" value="#FFFFFF" oninput="updateSports()">
                    </div>
                    <div class="switch-container">
                        <span style="font-size:10px;">1T</span>
                        <label class="switch">
                            <input type="checkbox" id="period-toggle" onchange="handlePeriodChange()">
                            <span class="slider"></span>
                        </label>
                        <span style="font-size:10px;">2T</span>
                    </div>
                </div>
                <div>
                    <label>EXTRA (+MIN)</label>
                    <input type="number" id="extra-min" value="0" oninput="updateSports()">
                    <div class="color-group" style="margin-top:5px;">
                        <input type="color" id="bg-extra" value="#FF0000" oninput="updateSports()">
                        <input type="color" id="txt-extra" value="#FFFFFF" oninput="updateSports()">
                    </div>
                </div>
            </div>
            <button class="btn btn-blue" onclick="sendClock('start')">INICIAR RELOJ</button>
            <div class="grid-2">
                <button class="btn btn-gray" onclick="sendClock('stop')">PAUSAR</button>
                <button class="btn btn-hide" onclick="resetFullSports()">RESET</button>
            </div>
        </div>
    </div>

    <div id="tab-zocalos" class="tab-content">
        <div class="card">
            <label>CINTILLO (LOWER THIRD)</label>
            <input type="text" id="z-title" placeholder="Título Principal" value="MARCO ANTONIO" oninput="updateZocalos()">
            <input type="text" id="z-subtitle" placeholder="Subtítulo" value="COMENTARISTA DEPORTIVO" style="margin-top:5px;" oninput="updateZocalos()">
            
            <div class="grid-2" style="margin-top:10px;">
                <div>
                    <label>ESTILO</label>
                    <select id="z-style" onchange="updateZocalos()">
                        <option value="modern">MODERN</option>
                        <option value="neon">NEON</option>
                        <option value="glass">GLASS</option>
                        <option value="minimal">MINIMAL</option>
                    </select>
                </div>
                <div>
                    <label>COLOR BASE</label>
                    <input type="color" id="z-color" value="#1f6feb" style="width:100%" oninput="updateZocalos()">
                </div>
            </div>
            <button class="btn btn-blue" id="btn-z-toggle" onclick="toggleZocalo()">MOSTRAR CINTILLO</button>
        </div>

        <div class="card">
            <label>BARRA DE NOTICIAS (TICKER)</label>
            <textarea id="z-ticker-text" rows="2" placeholder="Escribe las noticias aquí..." oninput="updateZocalos()">ULTIMO MINUTO: EL PARTIDO SE JUEGA A PUERTAS CERRADAS EN EL ESTADIO NACIONAL...</textarea>
            <div class="switch-container" style="justify-content: flex-start;">
                <label class="switch">
                    <input type="checkbox" id="z-ticker-visible" onchange="updateZocalos()">
                    <span class="slider"></span>
                </label>
                <label style="margin:0">ACTIVAR TICKER DE NOTICIAS</label>
            </div>
        </div>

        <div class="card grid-2">
            <div>
                <label>RED SOCIAL</label>
                <select id="z-social-net" onchange="updateZocalos()">
                    <option value="fb">FACEBOOK</option>
                    <option value="ig">INSTAGRAM</option>
                    <option value="tw">X (TWITTER)</option>
                    <option value="yt">YOUTUBE</option>
                </select>
                <input type="text" id="z-social-handle" value="@tuusuario" oninput="updateZocalos()" style="margin-top:5px;">
                <button class="btn btn-gray" id="btn-soc-toggle" onclick="toggleSocial()" style="font-size:10px;">TOGGLE REDES</button>
            </div>
            <div>
                <label>EXTRA BUG</label>
                <div class="switch-container" style="justify-content: flex-start;">
                    <label class="switch"><input type="checkbox" id="z-bug-live" onchange="updateZocalos()"><span class="slider"></span></label>
                    <span style="font-size:10px;">VIVO</span>
                </div>
                <div class="switch-container" style="justify-content: flex-start;">
                    <label class="switch"><input type="checkbox" id="z-bug-clock" onchange="updateZocalos()"><span class="slider"></span></label>
                    <span style="font-size:10px;">HORA</span>
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar" id="bar-sports">
        <button class="btn btn-show" style="flex:2" onclick="sendSportsUI('show')">MOSTRAR MARCADOR</button>
        <button class="btn btn-hide" style="flex:1" onclick="sendSportsUI('hide')">OCULTAR</button>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const TOPIC_SPORTS = "marcador_oscar_pro_2024";
        const TOPIC_ZOCALOS = "sc_zocalo/stream";

        let sportsState = { scoreL: 0, scoreV: 0 };
        let zocaloVisible = false;
        let socialVisible = false;

        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("tab");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            // Mostrar/Ocultar barra de botones según pestaña
            document.getElementById('bar-sports').style.display = (tabName === 'tab-deportes') ? 'flex' : 'none';
        }

        // --- LÓGICA DEPORTES ---
        function changeScore(team, val) {
            if(team === 'l') sportsState.scoreL = Math.max(0, sportsState.scoreL + val);
            else sportsState.scoreV = Math.max(0, sportsState.scoreV + val);
            document.getElementById('display-score').innerText = `${sportsState.scoreL} - ${sportsState.scoreV}`;
            updateSports();
        }

        function handlePeriodChange() {
            sendClock('reset');
            updateSports();
        }

        function updateSports() {
            const is2T = document.getElementById('period-toggle').checked;
            let data = {
                nameL: document.getElementById('name-l').value,
                nameV: document.getElementById('name-v').value,
                scoreL: sportsState.scoreL,
                scoreV: sportsState.scoreV,
                logoL: document.getElementById('logo-l').value,
                logoV: document.getElementById('logo-v').value,
                bgL: document.getElementById('bg-l').value,
                txtL: document.getElementById('txt-l').value,
                bgV: document.getElementById('bg-v').value,
                txtV: document.getElementById('txt-v').value,
                bgClock: document.getElementById('bg-clock').value,
                txtClock: document.getElementById('txt-clock').value,
                bgExtra: document.getElementById('bg-extra').value,
                txtExtra: document.getElementById('txt-extra').value,
                limit: document.getElementById('limit-min').value,
                extra: document.getElementById('extra-min').value,
                periodText: is2T ? "2T" : "1T",
                periodBg: document.getElementById('bg-p').value,
                periodTxt: document.getElementById('txt-p').value
            };

            if (is2T) {
                const temp = { ...data };
                data.nameL = temp.nameV; data.nameV = temp.nameL;
                data.scoreL = temp.scoreV; data.scoreV = temp.scoreL;
                data.logoL = temp.logoV; data.logoV = temp.logoL;
                data.bgL = temp.bgV; data.bgV = temp.bgL;
                data.txtL = temp.txtV; data.txtV = temp.txtL;
            }
            client.publish(TOPIC_SPORTS, JSON.stringify({ type: 'update_info', data: data }));
        }

        function sendClock(cmd) { client.publish(TOPIC_SPORTS, JSON.stringify({ type: 'control_clock', data: { command: cmd } })); updateSports(); }
        function sendSportsUI(action) { client.publish(TOPIC_SPORTS, JSON.stringify({ type: 'control_ui', data: { action: action } })); }
        function resetFullSports() { if(confirm("¿Resetear Marcador?")) { sportsState.scoreL = 0; sportsState.scoreV = 0; sendClock('reset'); updateSports(); } }

        // --- LÓGICA ZÓCALOS ---
        function toggleZocalo() {
            zocaloVisible = !zocaloVisible;
            document.getElementById('btn-z-toggle').innerText = zocaloVisible ? "OCULTAR CINTILLO" : "MOSTRAR CINTILLO";
            document.getElementById('btn-z-toggle').className = zocaloVisible ? "btn btn-hide" : "btn btn-blue";
            updateZocalos();
        }

        function toggleSocial() {
            socialVisible = !socialVisible;
            updateZocalos();
        }

        function updateZocalos() {
            const data = {
                lt: {
                    visible: zocaloVisible,
                    title: document.getElementById('z-title').value,
                    subtitle: document.getElementById('z-subtitle').value,
                    style: document.getElementById('z-style').value,
                    color: document.getElementById('z-color').value,
                    scale: 100
                },
                ticker: {
                    visible: document.getElementById('z-ticker-visible').checked,
                    text: document.getElementById('z-ticker-text').value,
                    speed: 25
                },
                social: {
                    visible: socialVisible,
                    net: document.getElementById('z-social-net').value,
                    handle: document.getElementById('z-social-handle').value
                },
                bug: {
                    showLive: document.getElementById('z-bug-live').checked,
                    showClock: document.getElementById('z-bug-clock').checked,
                    text: "VIVO"
                }
            };
            client.publish(TOPIC_ZOCALOS, JSON.stringify({ type: 'zocalo_update', data: data }));
        }
    </script>
</body>
</html>
