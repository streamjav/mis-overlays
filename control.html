<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Match Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121418; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1c2128; padding: 20px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .team-ctrl { flex: 1; text-align: center; background: #2d333b; padding: 10px; border-radius: 10px; }
        
        input { width: 100%; background: #0d1117; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        
        /* Botones de Score */
        .score-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn { border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-plus { background: #238636; color: white; font-size: 20px; }
        .btn-minus { background: #da3633; color: white; }
        
        /* Reloj */
        .clock-ctrl { background: #22272e; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .btn-start { background: #58a6ff; color: white; padding: 15px; font-size: 18px; }
        .btn-reset { background: #8b949e; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0; color:#58a6ff;">CONTROL DE PARTIDO</h2>
        
        <div class="row">
            <div class="team-ctrl">
                <label>LOCAL</label>
                <input type="text" id="name-l" value="LOCAL">
                <input type="text" id="logo-l" placeholder="URL Logo" value="https://cdn-icons-png.flaticon.com/512/1165/1165230.png">
                <div class="score-btns">
                    <button class="btn btn-minus" onclick="changeScore('l', -1)">-</button>
                    <button class="btn btn-plus" onclick="changeScore('l', 1)">+</button>
                </div>
            </div>

            <div style="font-size: 30px; font-weight: bold;" id="display-score">0 - 0</div>

            <div class="team-ctrl">
                <label>VISITA</label>
                <input type="text" id="name-v" value="VISITA">
                <input type="text" id="logo-v" placeholder="URL Logo" value="https://cdn-icons-png.flaticon.com/512/1165/1165245.png">
                <div class="score-btns">
                    <button class="btn btn-minus" onclick="changeScore('v', -1)">-</button>
                    <button class="btn btn-plus" onclick="changeScore('v', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div style="flex:1">
                <label>Tiempo Base (Min)</label>
                <input type="number" id="limit-min" value="45">
            </div>
            <div style="flex:1">
                <label>Tiempo Extra (+Min)</label>
                <input type="number" id="extra-min" value="0">
            </div>
            <div style="flex:1">
                <label>Color</label>
                <input type="color" id="color-picker" value="#00ff88">
            </div>
        </div>

        <div class="clock-ctrl">
            <button class="btn btn-start" onclick="sendClock('start')">INICIAR / REANUDAR</button>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-reset" style="flex:1" onclick="sendClock('stop')">PAUSAR</button>
                <button class="btn btn-reset" style="flex:1" onclick="sendClock('reset')">RESETEAR 00:00</button>
            </div>
        </div>

        <div class="row" style="margin-top:20px;">
            <button class="btn btn-plus" style="flex:1; background:#2ecc71" onclick="sendUI('show')">MOSTRAR EN OBS</button>
            <button class="btn btn-plus" style="flex:1; background:#e74c3c" onclick="sendUI('hide')">OCULTAR</button>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('ultra_pro_match');
        let scoreL = 0;
        let scoreV = 0;

        // Sincronizar todo al cambiar cualquier input
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', updateAll);
        });

        function changeScore(team, val) {
            if(team === 'l') scoreL = Math.max(0, scoreL + val);
            if(team === 'v') scoreV = Math.max(0, scoreV + val);
            document.getElementById('display-score').innerText = `${scoreL} - ${scoreV}`;
            updateAll();
        }

        function updateAll() {
            bc.postMessage({
                type: 'update_info',
                data: {
                    nameL: document.getElementById('name-l').value,
                    nameV: document.getElementById('name-v').value,
                    scoreL: scoreL,
                    scoreV: scoreV,
                    logoL: document.getElementById('logo-l').value,
                    logoV: document.getElementById('logo-v').value,
                    limit: document.getElementById('limit-min').value,
                    extra: document.getElementById('extra-min').value,
                    color: document.getElementById('color-picker').value
                }
            });
        }

        function sendClock(cmd) {
            bc.postMessage({ type: 'control_clock', data: { command: cmd } });
            updateAll(); // Forzar actualización de límites por si se cambiaron antes de iniciar
        }

        function sendUI(action) {
            bc.postMessage({ type: 'control_ui', data: { action: action } });
        }
    </script>
</body>
</html>
