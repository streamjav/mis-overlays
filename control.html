<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { cursor: pointer; padding: 10px; margin: 5px; }
        .btn-show { background: #2ecc71; color: white; border: none; }
        .btn-hide { background: #e74c3c; color: white; border: none; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Marcador de Fútbol</h3>
        Local: <input type="text" id="t1-name" value="LOCAL"> 
        Goles: <input type="number" id="t1-score" value="0"><br><br>
        Visita: <input type="text" id="t2-name" value="VISITA"> 
        Goles: <input type="number" id="t2-score" value="0"><br><br>
        <button class="btn-show" onclick="updateScore('show')">MOSTRAR / ACTUALIZAR</button>
        <button class="btn-hide" onclick="updateScore('hide')">OCULTAR</button>
    </div>

    <div class="card">
        <h3>Zócalo (Lower Third)</h3>
        Título: <input type="text" id="lt-title" value="GOOOOL!"><br>
        Sub: <input type="text" id="lt-sub" value="Minuto 45' - Lionel Messi"><br><br>
        <button class="btn-show" onclick="updateLT('show')">MOSTRAR</button>
        <button class="btn-hide" onclick="updateLT('hide')">OCULTAR</button>
    </div>

    <script>
        const bc = new BroadcastChannel('obs_market');

        function updateScore(action) {
            bc.postMessage({
                type: 'score',
                action: action,
                data: {
                    t1Name: document.getElementById('t1-name').value,
                    t1Score: document.getElementById('t1-score').value,
                    t2Name: document.getElementById('t2-name').value,
                    t2Score: document.getElementById('t2-score').value
                }
            });
        }

        function updateLT(action) {
            bc.postMessage({
                type: 'lt',
                action: action,
                data: {
                    title: document.getElementById('lt-title').value,
                    sub: document.getElementById('lt-sub').value
                }
            });
        }
    </script>
</body>
</html>
