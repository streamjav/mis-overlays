<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <title>Control de Deportes y Zócalos PRO</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #1f6feb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }

        .tabs { display: flex; background: #010409; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #8b949e; border-bottom: 2px solid transparent; font-size: 12px; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); background: var(--card); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }

        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }

        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-z { background: #30363d; border: none; color: white; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-z.active { background: #238636; }
        .btn-send { background: var(--accent); color: white; width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showTab('tab-marcador')">MARCADOR</div>
        <div class="tab" onclick="showTab('tab-zocalos')">ZÓCALOS</div>
        <div class="tab" onclick="showTab('tab-crono')">CRONO</div>
        <div class="tab" onclick="showTab('tab-webrtc')">WEBRTC</div>
    </div>

    <div class="container">
        <div id="tab-marcador" class="tab-content active">
            <div class="card">
                <button class="btn-z" id="btn-score-toggle" onclick="toggleScore()">MARCADOR OCULTO</button>
                <div class="grid2" style="margin-top:15px">
                    <div>
                        <div class="section-title">LOCAL</div>
                        <label>Nombre</label><input type="text" id="name-a" value="LOCAL">
                        <label>Logo URL</label><input type="text" id="logo-a">
                        <label>Goles</label><input type="number" id="score-a" value="0">
                    </div>
                    <div>
                        <div class="section-title">VISITA</div>
                        <label>Nombre</label><input type="text" id="name-b" value="VISITA">
                        <label>Logo URL</label><input type="text" id="logo-b">
                        <label>Goles</label><input type="number" id="score-b" value="0">
                    </div>
                </div>
                <button class="btn-send" onclick="updateScore()">ACTUALIZAR MARCADOR</button>
            </div>
        </div>

        <div id="tab-zocalos" class="tab-content">
            <div class="card">
                <button class="btn-z" id="btn-z-lt" onclick="toggleZPart('lt')">ZÓCALO OFF</button>
                <div style="margin-top:10px">
                    <label>Título</label><input type="text" id="z-title" value="TEXTO PRINCIPAL">
                    <label>Subtítulo</label><input type="text" id="z-sub" value="Descripción del evento">
                    <div class="grid2">
                        <div><label>Color</label><input type="color" id="z-color" value="#e62020"></div>
                        <div><label>Escala %</label><input type="number" id="z-scale" value="100"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="grid2">
                    <button class="btn-z" id="btn-z-ticker" onclick="toggleZPart('ticker')">TICKER OFF</button>
                    <button class="btn-z" id="btn-z-social" onclick="toggleZPart('social')">SOCIAL OFF</button>
                </div>
                <div style="margin-top:10px">
                    <label>Texto Ticker</label><input type="text" id="z-ticker-text" placeholder="Noticias...">
                    <label>Red Social</label>
                    <select id="z-soc-net"><option value="instagram">Instagram</option><option value="facebook">Facebook</option><option value="twitter">X (Twitter)</option></select>
                    <input type="text" id="z-soc-handle" placeholder="@usuario">
                </div>
            </div>
            <div class="card">
                <div class="grid2">
                    <button class="btn-z" id="btn-z-bug-live" onclick="toggleZPart('bug-live')">LIVE OFF</button>
                    <button class="btn-z" id="btn-z-bug-clock" onclick="toggleZPart('bug-clock')">RELOJ OFF</button>
                </div>
            </div>
            <button class="btn-send" onclick="updateZocalo()">ENVIAR TODO</button>
        </div>

        <div id="tab-crono" class="tab-content">
            <div class="card">
                <div style="font-size: 40px; text-align: center; margin-bottom: 20px;" id="crono-display">00:00</div>
                <div class="grid2">
                    <button class="btn-send" onclick="startTimer()" style="background:#238636">INICIAR</button>
                    <button class="btn-send" onclick="stopTimer()" style="background:#da3633">PARAR</button>
                </div>
                <button class="btn-send" onclick="resetTimer()" style="background:#30363d">RESETEAR (00:00)</button>
            </div>
        </div>

        <div id="tab-webrtc" class="tab-content">
            <div class="card">
                <div class="section-title">CONTROL WEBRTC</div>
                <label>Link de Video (WebRTC / VDO.ninja / WHEP)</label>
                <input type="text" id="w-url" placeholder="https://vdo.ninja/?v=room123..." oninput="updateWebRTCState()">
                
                <label>Posicionamiento en Pantalla</label>
                <select id="w-layout" onchange="updateWebRTCState()">
                    <option value="fullscreen">PANTALLA COMPLETA (Fondo)</option>
                    <option value="pip-tr">PICTURE IN PICTURE (Sup. Derecha)</option>
                    <option value="pip-tl">PICTURE IN PICTURE (Sup. Izquierda)</option>
                    <option value="pip-br">PICTURE IN PICTURE (Inf. Derecha)</option>
                    <option value="pip-bl">PICTURE IN PICTURE (Inf. Izquierda)</option>
                </select>

                <button class="btn-send" id="btn-w-toggle" onclick="toggleWebRTC()" style="background: #30363d;">MOSTRAR TRANSMISIÓN</button>
            </div>
        </div>

    </div>

    <script>
        const ID_UNICO = "SISTEMA_PRO_2024";
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        let scoreState = { visible: false, teamA: { name: "LOCAL", score: 0, logo: "" }, teamB: { name: "VISITA", score: 0, logo: "" } };
        let zState = { 
            lt: { visible: false, title: "", subtitle: "", color: "#e62020", scale: 100 },
            ticker: { visible: false, text: "", speed: 25 },
            logo: { url: "" },
            social: { visible: false, net: "instagram", handle: "" },
            bug: { showLive: false, showClock: false }
        };
        let wState = { visible: false, url: "", layout: "fullscreen" };

        let timerSeconds = 0, timerInterval = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- LÓGICA MARCADOR ---
        function toggleScore() {
            scoreState.visible = !scoreState.visible;
            const btn = document.getElementById('btn-score-toggle');
            btn.innerText = scoreState.visible ? "MARCADOR VISIBLE" : "MARCADOR OCULTO";
            btn.classList.toggle('active', scoreState.visible);
            updateScore();
        }

        function updateScore() {
            scoreState.teamA = { name: document.getElementById('name-a').value, score: document.getElementById('score-a').value, logo: document.getElementById('logo-a').value };
            scoreState.teamB = { name: document.getElementById('name-b').value, score: document.getElementById('score-b').value, logo: document.getElementById('logo-b').value };
            client.publish(ID_UNICO, JSON.stringify({ type: 'score_update', data: scoreState }));
            saveData();
        }

        // --- LÓGICA ZÓCALOS ---
        function toggleZPart(part) {
            if(part==='lt') zState.lt.visible = !zState.lt.visible;
            if(part==='ticker') zState.ticker.visible = !zState.ticker.visible;
            if(part==='social') zState.social.visible = !zState.social.visible;
            if(part==='bug-live') zState.bug.showLive = !zState.bug.showLive;
            if(part==='bug-clock') zState.bug.showClock = !zState.bug.showClock;
            
            const btns = { lt:'btn-z-lt', ticker:'btn-z-ticker', social:'btn-z-social', 'bug-live':'btn-z-bug-live', 'bug-clock':'btn-z-bug-clock' };
            const btn = document.getElementById(btns[part]);
            btn.classList.toggle('active');
            updateZocalo();
        }

        function updateZocalo() {
            zState.lt.title = document.getElementById('z-title').value;
            zState.lt.subtitle = document.getElementById('z-sub').value;
            zState.lt.color = document.getElementById('z-color').value;
            zState.lt.scale = document.getElementById('z-scale').value;
            zState.ticker.text = document.getElementById('z-ticker-text').value;
            zState.social.net = document.getElementById('z-soc-net').value;
            zState.social.handle = document.getElementById('z-soc-handle').value;
            client.publish(ID_UNICO, JSON.stringify({ type: 'zocalo_update', data: zState }));
            saveData();
        }

        // --- LÓGICA WEBRTC ---
        function toggleWebRTC() {
            wState.visible = !wState.visible;
            const btn = document.getElementById('btn-w-toggle');
            if (wState.visible) {
                btn.innerText = "OCULTAR TRANSMISIÓN";
                btn.style.background = "#da3633";
            } else {
                btn.innerText = "MOSTRAR TRANSMISIÓN";
                btn.style.background = "#238636";
            }
            updateWebRTCState();
        }

        function updateWebRTCState() {
            wState.url = document.getElementById('w-url').value;
            wState.layout = document.getElementById('w-layout').value;
            client.publish(ID_UNICO, JSON.stringify({ type: 'webrtc_update', data: wState }));
            saveData();
        }

        // --- LÓGICA CRONO ---
        function startTimer() { if(!timerInterval) timerInterval = setInterval(() => { timerSeconds++; sendTimer(); }, 1000); }
        function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
        function resetTimer() { stopTimer(); timerSeconds = 0; sendTimer(); }
        function sendTimer() {
            const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
            const s = (timerSeconds%60).toString().padStart(2,'0');
            const timeStr = `${m}:${s}`;
            document.getElementById('crono-display').innerText = timeStr;
            client.publish(ID_UNICO, JSON.stringify({ type: 'timer_update', data: { time: timeStr } }));
        }

        // --- PERSISTENCIA ---
        function saveData() {
            const data = { scoreState, zState, wState };
            localStorage.setItem('SISTEMA_DATA', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('SISTEMA_DATA');
            if (saved) {
                const { scoreState: s, zState: z, wState: w } = JSON.parse(saved);
                if(s) {
                    document.getElementById('name-a').value = s.teamA.name;
                    document.getElementById('score-a').value = s.teamA.score;
                    document.getElementById('logo-a').value = s.teamA.logo;
                    document.getElementById('name-b').value = s.teamB.name;
                    document.getElementById('score-b').value = s.teamB.score;
                    document.getElementById('logo-b').value = s.teamB.logo;
                }
                if(z) {
                    document.getElementById('z-title').value = z.lt.title;
                    document.getElementById('z-sub').value = z.lt.subtitle;
                    document.getElementById('z-color').value = z.lt.color;
                    document.getElementById('z-ticker-text').value = z.ticker.text;
                    document.getElementById('z-soc-handle').value = z.social.handle;
                }
                if(w) {
                    document.getElementById('w-url').value = w.url || "";
                    document.getElementById('w-layout').value = w.layout || "fullscreen";
                }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
