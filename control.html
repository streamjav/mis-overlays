<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <title>Master Mobile Control</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 15px; margin: 0; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; background: #010409; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-top: 5px; }
        .btn { border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .score-display { font-size: 24px; text-align: center; margin: 10px 0; font-weight: bold; background: #0d1117; padding: 10px; border-radius: 8px; color: #58a6ff; }
        label { font-size: 12px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="card">
        <div class="grid">
            <div>
                <label>LOCAL</label>
                <input type="text" id="name-l" value="LOCAL" onchange="updateAll()">
                <button class="btn btn-green" onclick="changeScore('l', 1)">+ GOL</button>
                <button class="btn btn-red" onclick="changeScore('l', -1)">-1</button>
            </div>
            <div>
                <label>VISITA</label>
                <input type="text" id="name-v" value="VISITA" onchange="updateAll()">
                <button class="btn btn-green" onclick="changeScore('v', 1)">+ GOL</button>
                <button class="btn btn-red" onclick="changeScore('v', -1)">-1</button>
            </div>
        </div>
        <div class="score-display" id="display-score">0 - 0</div>
    </div>

    <div class="card">
        <div class="grid">
            <div>
                <label>TIEMPO BASE (MIN)</label>
                <input type="number" id="limit-min" value="45" onchange="updateAll()">
            </div>
            <div>
                <label>EXTRA (+MIN)</label>
                <input type="number" id="extra-min" value="0" onchange="updateAll()">
            </div>
        </div>
        <button class="btn btn-blue" onclick="sendClock('start')">INICIAR RELOJ</button>
        <div class="grid">
            <button class="btn" style="background:#30363d; color:white;" onclick="sendClock('stop')">PAUSAR</button>
            <button class="btn" style="background:#30363d; color:white;" onclick="sendClock('reset')">RESET</button>
        </div>
    </div>

    <div class="card">
        <label>URL LOGOS (PNG)</label>
        <input type="text" id="logo-l" value="https://cdn-icons-png.flaticon.com/512/1165/1165230.png" onchange="updateAll()">
        <input type="text" id="logo-v" value="https://cdn-icons-png.flaticon.com/512/1165/1165245.png" onchange="updateAll()">
        <label>COLOR ACENTO</label>
        <input type="color" id="color-picker" value="#00ff88" onchange="updateAll()">
    </div>

    <button class="btn btn-green" style="position:fixed; bottom:10px; left:10px; width:45%;" onclick="sendUI('show')">MOSTRAR</button>
    <button class="btn btn-red" style="position:fixed; bottom:10px; right:10px; width:45%;" onclick="sendUI('hide')">OCULTAR</button>

    <script>
        const ID_UNICO = "marcador_oscar_pro_2024";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let scoreL = 0; let scoreV = 0;

        function changeScore(team, val) {
            if(team === 'l') scoreL = Math.max(0, scoreL + val);
            if(team === 'v') scoreV = Math.max(0, scoreV + val);
            document.getElementById('display-score').innerText = `${scoreL} - ${scoreV}`;
            updateAll();
        }

        function updateAll() {
            const payload = {
                type: 'update_info',
                data: {
                    nameL: document.getElementById('name-l').value,
                    nameV: document.getElementById('name-v').value,
                    scoreL: scoreL,
                    scoreV: scoreV,
                    logoL: document.getElementById('logo-l').value,
                    logoV: document.getElementById('logo-v').value,
                    limit: document.getElementById('limit-min').value,
                    extra: document.getElementById('extra-min').value,
                    color: document.getElementById('color-picker').value
                }
            };
            client.publish(ID_UNICO, JSON.stringify(payload));
        }

        function sendClock(cmd) {
            client.publish(ID_UNICO, JSON.stringify({ type: 'control_clock', data: { command: cmd } }));
            updateAll();
        }

        function sendUI(action) {
            client.publish(ID_UNICO, JSON.stringify({ type: 'control_ui', data: { action: action } }));
        }
    </script>
</body>
</html>
