<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <title>Control Maestro - Deportes & Zócalos</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #1f6feb; --success: #238636; --danger: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        
        .tabs { display: flex; background: #010409; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #8b949e; border-bottom: 2px solid transparent; font-size: 12px; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); background: var(--card); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 8px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
        .section-title { font-size: 11px; color: #8b949e; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; display: block; }
        
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; background: #010409; border: 1px solid var(--border); color: white; padding: 10px; 
            border-radius: 6px; box-sizing: border-box; margin-bottom: 10px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; color: white; margin-bottom: 5px; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-gray { background: #30363d; }

        /* Estilos específicos para la pestaña Zócalos (Acordeón) */
        details { background: #010409; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
        summary { padding: 12px; cursor: pointer; font-weight: bold; font-size: 13px; background: #161b22; }
        .details-content { padding: 15px; border-top: 1px solid var(--border); }
        .color-picker-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }

        /* Botón de acción flotante */
        .floating-actions { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1117; padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; max-width: 500px; margin: auto; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="openTab(0)">DEPORTES</div>
        <div class="tab" onclick="openTab(1)">ZÓCALOS</div>
        <div class="tab" onclick="openTab(2)">WEBRTC</div>
        <div class="tab" onclick="openTab(3)">PLAYLIST</div>
    </div>

    <div class="container">
        <div id="tab-deportes" class="tab-content active">
            <div class="card">
                <span class="section-title">Equipos y Colores</span>
                <div class="grid-2">
                    <div>
                        <input type="color" id="bg-l" value="#0000FF" oninput="updateAll()">
                        <input type="color" id="txt-l" value="#FFFFFF" oninput="updateAll()">
                        <input type="text" id="name-l" value="LOCAL" oninput="updateAll()">
                        <input type="text" id="logo-l" placeholder="URL Logo Local" oninput="updateAll()">
                    </div>
                    <div>
                        <input type="color" id="bg-v" value="#FFFF00" oninput="updateAll()">
                        <input type="color" id="txt-v" value="#000000" oninput="updateAll()">
                        <input type="text" id="name-v" value="VISITA" oninput="updateAll()">
                        <input type="text" id="logo-v" placeholder="URL Logo Visita" oninput="updateAll()">
                    </div>
                </div>
            </div>

            <div class="card">
                <span class="section-title">Marcador y Tiempo</span>
                <div class="grid-2">
                    <button class="btn btn-blue" onclick="changeScore('l', 1)">GOL LOCAL</button>
                    <button class="btn btn-blue" onclick="changeScore('v', 1)">GOL VISITA</button>
                </div>
                <div class="grid-2" style="margin-top: 10px;">
                    <div>
                        <label style="font-size: 10px;">TIEMPO LÍMITE</label>
                        <input type="number" id="limit-min" value="45" oninput="updateAll()">
                    </div>
                    <div>
                        <label style="font-size: 10px;">TIEMPO EXTRA</label>
                        <input type="number" id="extra-min" value="0" oninput="updateAll()">
                    </div>
                </div>
                <div class="grid-2">
                    <button class="btn btn-green" onclick="sendClock('start')">INICIAR</button>
                    <button class="btn btn-gray" onclick="sendClock('stop')">PAUSAR</button>
                </div>
                <button class="btn btn-red" style="margin-top:10px" onclick="sendClock('reset')">RESET TIEMPO</button>
            </div>

            <div class="card">
                <span class="section-title">Configuración de Periodo</span>
                <div class="grid-2">
                    <input type="color" id="bg-p" value="#FF0000" oninput="updateAll()">
                    <input type="color" id="txt-p" value="#FFFFFF" oninput="updateAll()">
                </div>
                <select id="period-toggle" onchange="updateAll()">
                    <option value="1T">PRIMER TIEMPO (1T)</option>
                    <option value="2T">SEGUNDO TIEMPO (2T)</option>
                </select>
                <div class="grid-2">
                    <input type="color" id="bg-clock" value="#FFFFFF" oninput="updateAll()">
                    <input type="color" id="txt-clock" value="#000000" oninput="updateAll()">
                    <input type="color" id="bg-extra" value="#FF0000" oninput="updateAll()">
                    <input type="color" id="txt-extra" value="#FFFFFF" oninput="updateAll()">
                </div>
            </div>
        </div>

        <div id="tab-zocalos" class="tab-content">
            <div class="card">
                <button class="btn btn-green" id="btn-show-zocalo" onclick="toggleZocaloVisible()">MOSTRAR CINTILLO</button>
                
                <details open>
                    <summary>DISEÑO DEL CINTILLO</summary>
                    <div class="details-content">
                        <label class="section-title">Estilo Visual</label>
                        <select id="z-style" onchange="updateZocaloMQTT()">
                            <option value="modern">MODERN</option>
                            <option value="minimal">MINIMAL</option>
                            <option value="glass">GLASS</option>
                            <option value="neon">NEON</option>
                            <option value="sport">SPORT</option>
                        </select>
                        
                        <label class="section-title">Color Principal</label>
                        <div class="color-picker-row">
                            <input type="color" id="z-color" value="#3b82f6" oninput="updateZocaloMQTT()">
                            <span id="z-color-hex">#3b82f6</span>
                        </div>

                        <label class="section-title">Texto Principal</label>
                        <input type="text" id="z-title" value="OSCAR ABAD" placeholder="Ej: Nombre de la persona" oninput="updateZocaloMQTT()">
                        
                        <label class="section-title">Subtítulo / Cargo</label>
                        <input type="text" id="z-subtitle" value="DIRECTOR TÉCNICO" placeholder="Ej: Periodista / Invitado" oninput="updateZocaloMQTT()">
                    </div>
                </details>

                <details>
                    <summary>REDES SOCIALES</summary>
                    <div class="details-content">
                        <button class="btn btn-blue" id="btn-social-visible" onclick="toggleSocialVisible()">MOSTRAR REDES</button>
                        <select id="z-social-net" onchange="updateZocaloMQTT()" style="margin-top:10px">
                            <option value="instagram">INSTAGRAM</option>
                            <option value="facebook">FACEBOOK</option>
                            <option value="x">X (TWITTER)</option>
                            <option value="youtube">YOUTUBE</option>
                        </select>
                        <input type="text" id="z-social-handle" value="@oscar_abad" placeholder="@usuario" oninput="updateZocaloMQTT()">
                    </div>
                </details>

                <details>
                    <summary>NOTICIAS (TICKER)</summary>
                    <div class="details-content">
                        <button class="btn btn-blue" id="btn-ticker-visible" onclick="toggleTickerVisible()">MOSTRAR TICKER</button>
                        <label class="section-title" style="margin-top:10px">Texto de Noticias</label>
                        <textarea id="z-ticker-text" rows="3" oninput="updateZocaloMQTT()">BIENVENIDOS A LA TRANSMISIÓN OFICIAL DEL ENCUENTRO...</textarea>
                    </div>
                </details>

                <details>
                    <summary>BUG (VIVO / RELOJ)</summary>
                    <div class="details-content">
                        <div class="grid-2">
                            <button class="btn btn-gray" id="btn-bug-live" onclick="toggleBugLive()">MOSTRAR VIVO</button>
                            <button class="btn btn-gray" id="btn-bug-clock" onclick="toggleBugClock()">MOSTRAR HORA</button>
                        </div>
                        <input type="text" id="z-bug-text" value="VIVO" style="margin-top:10px" oninput="updateZocaloMQTT()">
                    </div>
                </details>
            </div>
        </div>

        <div id="tab-webrtc" class="tab-content"> <div class="card">Próximamente...</div> </div>
        <div id="tab-playlist" class="tab-content"> <div class="card">Próximamente...</div> </div>
    </div>

    <div class="floating-actions" id="sports-actions">
        <button class="btn btn-green" onclick="sendUI('show')">MOSTRAR MARCADOR</button>
        <button class="btn btn-red" onclick="sendUI('hide')">OCULTAR</button>
    </div>

    <script>
        const ID_UNICO = "marcador_oscar_pro_2024";
        const TOPIC_ZOCALO = "sc_zocalo/stream";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        let scoreL = 0, scoreV = 0;
        
        // Estado de los Zócalos
        let zState = {
            lt: { visible: false, title: "OSCAR ABAD", subtitle: "DIRECTOR TÉCNICO", color: "#3b82f6", style: "modern", scale: 100 },
            ticker: { visible: false, text: "BIENVENIDOS A LA TRANSMISIÓN...", speed: 25 },
            social: { visible: false, net: "instagram", handle: "@oscar_abad" },
            bug: { showLive: false, showClock: false, text: "VIVO" }
        };

        function openTab(idx) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach((t, i) => {
                t.classList.toggle('active', i === idx);
                contents[i].classList.toggle('active', i === idx);
            });
            // Ocultar barra deportes si no estamos en esa pestaña
            document.getElementById('sports-actions').style.display = (idx === 0) ? 'flex' : 'none';
        }

        // --- LÓGICA DEPORTES ---
        function changeScore(team, val) {
            if(team === 'l') scoreL = Math.max(0, scoreL + val);
            else scoreV = Math.max(0, scoreV + val);
            updateAll();
        }

        function updateAll() {
            const is2T = document.getElementById('period-toggle').value === "2T";
            let data = {
                nameL: document.getElementById('name-l').value,
                nameV: document.getElementById('name-v').value,
                scoreL: scoreL, scoreV: scoreV,
                logoL: document.getElementById('logo-l').value,
                logoV: document.getElementById('logo-v').value,
                bgL: document.getElementById('bg-l').value,
                txtL: document.getElementById('txt-l').value,
                bgV: document.getElementById('bg-v').value,
                txtV: document.getElementById('txt-v').value,
                bgClock: document.getElementById('bg-clock').value,
                txtClock: document.getElementById('txt-clock').value,
                bgExtra: document.getElementById('bg-extra').value,
                txtExtra: document.getElementById('txt-extra').value,
                limit: document.getElementById('limit-min').value,
                extra: document.getElementById('extra-min').value,
                periodText: is2T ? "2T" : "1T",
                periodBg: document.getElementById('bg-p').value,
                periodTxt: document.getElementById('txt-p').value
            };

            if (is2T) {
                const temp = { ...data };
                data.nameL = temp.nameV; data.nameV = temp.nameL;
                data.scoreL = temp.scoreV; data.scoreV = temp.scoreL;
                data.logoL = temp.logoV; data.logoV = temp.logoL;
                data.bgL = temp.bgV; data.bgV = temp.bgL;
                data.txtL = temp.txtV; data.txtV = temp.txtL;
            }
            client.publish(ID_UNICO, JSON.stringify({ type: 'update_info', data: data }));
        }

        function sendClock(cmd) { client.publish(ID_UNICO, JSON.stringify({ type: 'control_clock', data: { command: cmd } })); updateAll(); }
        function sendUI(action) { client.publish(ID_UNICO, JSON.stringify({ type: 'control_ui', data: { action: action } })); }

        // --- LÓGICA ZÓCALOS ---
        function toggleZocaloVisible() { 
            zState.lt.visible = !zState.lt.visible; 
            document.getElementById('btn-show-zocalo').innerText = zState.lt.visible ? "OCULTAR CINTILLO" : "MOSTRAR CINTILLO";
            document.getElementById('btn-show-zocalo').className = zState.lt.visible ? "btn btn-red" : "btn btn-green";
            updateZocaloMQTT(); 
        }
        function toggleSocialVisible() { zState.social.visible = !zState.social.visible; updateZocaloMQTT(); }
        function toggleTickerVisible() { zState.ticker.visible = !zState.ticker.visible; updateZocaloMQTT(); }
        function toggleBugLive() { zState.bug.showLive = !zState.bug.showLive; updateZocaloMQTT(); }
        function toggleBugClock() { zState.bug.showClock = !zState.bug.showClock; updateZocaloMQTT(); }

        function updateZocaloMQTT() {
            zState.lt.title = document.getElementById('z-title').value;
            zState.lt.subtitle = document.getElementById('z-subtitle').value;
            zState.lt.style = document.getElementById('z-style').value;
            zState.lt.color = document.getElementById('z-color').value;
            zState.ticker.text = document.getElementById('z-ticker-text').value;
            zState.social.net = document.getElementById('z-social-net').value;
            zState.social.handle = document.getElementById('z-social-handle').value;
            zState.bug.text = document.getElementById('z-bug-text').value;
            
            document.getElementById('z-color-hex').innerText = zState.lt.color;
            
            client.publish(TOPIC_ZOCALO, JSON.stringify({ type: 'zocalo_update', data: zState }));
        }
    </script>
</body>
</html>
