<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Roboto Condensed', sans-serif; }
        
        /* --- MARCADOR DEPORTES (TOP) --- */
        #scoreboard {
            position: absolute; top: 40px; left: 50px; display: flex; align-items: stretch; height: 55px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transform: translateY(-120px); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #scoreboard.active { transform: translateY(0); }
        .team-container { display: flex; align-items: stretch; flex-grow: 1; }
        .logo-box { background: white; width: 55px; min-width: 55px; height: 55px; display: none; justify-content: center; align-items: center; }
        .logo-box img { width: 85%; height: 85%; object-fit: contain; }
        .name-box { font-size: 26px; text-transform: uppercase; min-width: 130px; display: flex; align-items: center; padding: 0 15px; flex-grow: 1; }
        .score-box { font-size: 38px; font-weight: 900; width: 55px; display: flex; align-items: center; justify-content: center; }
        .period-box { width: 42px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; z-index: 10; }
        .timer-box { width: 105px; min-width: 105px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', cursive; font-size: 40px; position: relative; }
        #extra-time-label { position: absolute; bottom: -28px; right: 0; font-size: 18px; padding: 2px 10px; font-weight: bold; display: none; }
        #group-l { flex-direction: row; }
        #group-v { flex-direction: row-reverse; }

        /* --- ZÓCALOS (BOTTOM) --- */
        .zocalo-wrap { position: absolute; left: 48px; bottom: 84px; transition: 0.5s cubic-bezier(0.16,1,0.3,1); opacity: 0; transform: translateY(30px); }
        .zocalo-visible { opacity: 1; transform: translateY(0); }
        .z-base { display: flex; flex-direction: column; font-family: 'Inter', sans-serif; }
        .z-title { padding: 12px 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .z-title h1 { margin: 0; font-size: 40px; font-weight: 900; color: white; text-transform: uppercase; line-height: 1; }
        .z-sub { padding: 5px 20px; font-weight: 700; text-transform: uppercase; font-size: 16px; color: white; width: fit-content; margin-top: -2px; }
        
        /* Estilos Zócalo */
        .z-modern .z-title { border-left: 10px solid white; }
        .z-neon .z-title { background: #000; border: 2px solid white; }
        .z-neon h1 { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .z-glass .z-title { backdrop-filter: blur(10px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

        /* --- TICKER NOTICIAS --- */
        .ticker-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 45px; background: #000; display: none; align-items: center; border-top: 3px solid white; }
        .ticker-label { background: white; color: black; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 5; }
        .ticker-content { flex: 1; overflow: hidden; white-space: nowrap; color: white; font-size: 18px; font-weight: 700; }
        .ticker-move { display: inline-block; animation: ticker-anim 20s linear infinite; padding-left: 100%; }
        @keyframes ticker-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- REDES Y BUG --- */
        .social-pill { position: absolute; bottom: 140px; right: 50px; background: white; padding: 8px 20px; border-radius: 5px; display: none; font-weight: 900; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .bug-container { position: absolute; top: 30px; left: 30px; display: flex; font-family: monospace; font-weight: bold; }
        .bug-live { background: #ff0000; color: white; padding: 5px 12px; display: none; }
        .bug-clock { background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; display: none; }
    </style>
</head>
<body>
    <div id="scoreboard">
        <div class="team-container" id="group-l">
            <div class="logo-box" id="logo-box-l"><img id="logo-l" src=""></div>
            <div class="name-box" id="name-l">LOCAL</div>
            <div class="score-box" id="score-l">0</div>
        </div>
        <div class="period-box" id="period-ui">1T</div>
        <div class="team-container" id="group-v">
            <div class="logo-box" id="logo-box-v"><img id="logo-v" src=""></div>
            <div class="name-box" id="name-v">VISITA</div>
            <div class="score-box" id="score-v">0</div>
        </div>
        <div class="timer-box" id="timer-ui"><span id="clock">00:00</span><div id="extra-time-label">+0</div></div>
    </div>

    <div id="z-wrap" class="zocalo-wrap">
        <div class="z-base" id="z-container">
            <div class="z-title" id="z-title-box"><h1 id="z-main">TITULO</h1></div>
            <div class="z-sub" id="z-sub-box">SUBTITULO</div>
        </div>
    </div>

    <div class="ticker-bar" id="t-bar">
        <div class="ticker-label">INFO</div>
        <div class="ticker-content"><div class="ticker-move" id="t-text">...</div></div>
    </div>

    <div class="social-pill" id="soc-pill">IG: @USER</div>
    <div class="bug-container">
        <div class="bug-live" id="bug-l">VIVO</div>
        <div class="bug-clock" id="bug-c">00:00</div>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let seconds = 0, timerInterval = null, limitMin = 45, extraMin = 0;

        client.on('connect', () => {
            client.subscribe("marcador_oscar_pro_2024");
            client.subscribe("sc_zocalo/stream");
        });

        client.on('message', (topic, message) => {
            const { type, data } = JSON.parse(message.toString());
            
            if (topic === "marcador_oscar_pro_2024") {
                if (type === 'update_info') applySports(data);
                if (type === 'control_ui') document.getElementById('scoreboard').classList.toggle('active', data.action === 'show');
                if (type === 'control_clock') handleClock(data.command);
            }
            if (topic === "sc_zocalo/stream") applyZocalo(data);
        });

        function applySports(d) {
            ['l','v'].forEach(t => {
                document.getElementById(`name-${t}`).innerText = d[`name${t.toUpperCase()}`];
                document.getElementById(`score-${t}`).innerText = d[`score${t.toUpperCase()}`];
                document.getElementById(`name-${t}`).style.backgroundColor = d[`bg${t.toUpperCase()}`];
                document.getElementById(`name-${t}`).style.color = d[`txt${t.toUpperCase()}`];
                document.getElementById(`score-${t}`).style.backgroundColor = d[`bg${t.toUpperCase()}`];
                document.getElementById(`score-${t}`).style.color = d[`txt${t.toUpperCase()}`];
                const lBox = document.getElementById(`logo-box-${t}`);
                const lImg = document.getElementById(`logo-${t}`);
                if(d[`logo${t.toUpperCase()}`]) { lBox.style.display = 'flex'; lImg.src = d[`logo${t.toUpperCase()}`]; }
                else lBox.style.display = 'none';
            });
            const p = document.getElementById('period-ui');
            p.innerText = d.periodText; p.style.backgroundColor = d.periodBg; p.style.color = d.periodTxt;
            const tBox = document.getElementById('timer-ui');
            tBox.style.backgroundColor = d.bgClock; tBox.style.color = d.txtClock;
            limitMin = parseInt(d.limit); extraMin = parseInt(d.extra);
            const ex = document.getElementById('extra-time-label');
            ex.innerText = `+${d.extra}`; ex.style.display = d.extra > 0 ? 'block' : 'none';
            ex.style.backgroundColor = d.bgExtra; ex.style.color = d.txtExtra;
        }

        function applyZocalo(d) {
            const w = document.getElementById('z-wrap');
            w.className = `zocalo-wrap ${d.lt.visible ? 'zocalo-visible' : ''} z-${d.lt.style}`;
            document.getElementById('z-main').innerText = d.lt.title;
            document.getElementById('z-sub-box').innerText = d.lt.subtitle;
            document.getElementById('z-title-box').style.backgroundColor = d.lt.color;
            document.getElementById('z-sub-box').style.backgroundColor = (d.lt.style === 'glass') ? 'rgba(0,0,0,0.5)' : '#333';
            
            const tBar = document.getElementById('t-bar');
            tBar.style.display = d.ticker.visible ? 'flex' : 'none';
            document.getElementById('t-text').innerText = `${d.ticker.text} • ${d.ticker.text} • `;
            
            const soc = document.getElementById('soc-pill');
            soc.style.display = d.social.visible ? 'block' : 'none';
            soc.innerText = `${d.social.net.toUpperCase()}: ${d.social.handle}`;

            document.getElementById('bug-l').style.display = d.bug.showLive ? 'block' : 'none';
            document.getElementById('bug-c').style.display = d.bug.showClock ? 'block' : 'none';
        }

        function handleClock(cmd) {
            if (cmd === 'start') {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => { if (seconds < (limitMin + extraMin) * 60) { seconds++; updateClock(); } }, 1000);
            } else if (cmd === 'stop') clearInterval(timerInterval);
            else { clearInterval(timerInterval); seconds = 0; updateClock(); }
        }

        function updateClock() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('bug-c').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }, 1000);
    </script>
</body>
</html>
