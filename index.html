<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: rgba(10, 10, 10, 0.95);
            --accent: #00ff88; /* Color por defecto */
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Roboto Condensed', sans-serif; }

        /* Contenedor Principal */
        #scoreboard {
            position: absolute;
            top: 40px;
            left: 50px;
            display: flex;
            align-items: stretch;
            height: 50px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transform: translateY(-100px);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #scoreboard.active { transform: translateY(0); }

        /* Estilo de los Bloques */
        .block { background: var(--bg-dark); display: flex; align-items: center; color: white; padding: 0 15px; border-right: 1px solid var(--glass); }

        /* Logos */
        .logo-box { background: white; padding: 5px; width: 45px; display: flex; justify-content: center; align-items: center; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Nombres y Score */
        .team-name { font-size: 22px; text-transform: uppercase; min-width: 100px; justify-content: center; letter-spacing: 1px; }
        .score-box { background: var(--accent); color: black; font-size: 32px; font-weight: 900; width: 50px; justify-content: center; }

        /* Cronómetro */
        .timer-box { 
            background: #1a1a1a; 
            min-width: 120px; 
            justify-content: center; 
            font-family: 'Bebas Neue', cursive; 
            font-size: 34px; 
            position: relative;
        }

        /* Tiempo Extra (+1, +5) */
        #extra-time-label {
            position: absolute;
            bottom: -25px;
            right: 0;
            background: var(--accent);
            color: black;
            font-size: 16px;
            padding: 2px 8px;
            font-weight: bold;
            display: none;
        }

        .separator { width: 5px; background: var(--accent); }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="logo-box"><img id="logo-l" src="" alt=""></div>
        <div class="block team-name" id="name-l">LOCAL</div>
        <div class="block score-box" id="score-l">0</div>

        <div class="separator"></div>

        <div class="block score-box" id="score-v">0</div>
        <div class="block team-name" id="name-v">VISITA</div>
        <div class="logo-box"><img id="logo-v" src="" alt=""></div>

        <div class="block timer-box">
            <span id="clock">00:00</span>
            <div id="extra-time-label">+0</div>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('ultra_pro_match');
        let seconds = 0;
        let timerInterval = null;
        let limitMinutes = 45;
        let extraMinutes = 0;

        bc.onmessage = (event) => {
            const { type, data } = event.data;

            if (type === 'update_info') {
                document.getElementById('name-l').innerText = data.nameL;
                document.getElementById('name-v').innerText = data.nameV;
                document.getElementById('score-l').innerText = data.scoreL;
                document.getElementById('score-v').innerText = data.scoreV;
                document.getElementById('logo-l').src = data.logoL;
                document.getElementById('logo-v').src = data.logoV;
                document.documentElement.style.setProperty('--accent', data.color);
                
                limitMinutes = parseInt(data.limit);
                extraMinutes = parseInt(data.extra);

                const extraLabel = document.getElementById('extra-time-label');
                if (extraMinutes > 0) {
                    extraLabel.innerText = `+${extraMinutes}`;
                    extraLabel.style.display = 'block';
                } else {
                    extraLabel.style.display = 'none';
                }
            }

            if (type === 'control_ui') {
                if(data.action === 'show') document.getElementById('scoreboard').classList.add('active');
                if(data.action === 'hide') document.getElementById('scoreboard').classList.remove('active');
            }

            if (type === 'control_clock') {
                if (data.command === 'start') startClock();
                if (data.command === 'stop') clearInterval(timerInterval);
                if (data.command === 'reset') resetClock();
            }
        };

        function startClock() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const totalLimitSeconds = (limitMinutes + extraMinutes) * 60;
                
                if (seconds < totalLimitSeconds) {
                    seconds++;
                    updateClockDisplay();
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function resetClock() {
            clearInterval(timerInterval);
            seconds = 0;
            updateClockDisplay();
        }

        function updateClockDisplay() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }
    </script>
</body>
</html>
