<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Roboto Condensed', sans-serif; }
        #scoreboard {
            position: absolute; top: 40px; left: 50px; display: flex; align-items: stretch; height: 55px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transform: translateY(-120px); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #scoreboard.active { transform: translateY(0); }
        
        .block { display: flex; align-items: center; padding: 0 15px; border-right: 1px solid rgba(255,255,255,0.1); }
        
        .logo-box { background: white; width: 55px; min-width: 55px; height: 55px; display: none; justify-content: center; align-items: center; }
        .logo-box img { width: 90%; height: 90%; object-fit: contain; }

        .team-name { font-size: 24px; text-transform: uppercase; min-width: 120px; justify-content: center; flex-grow: 1; }
        .score-box { font-size: 36px; font-weight: 900; width: 60px; justify-content: center; }

        /* Cuadro de Periodo */
        .period-box { width: 45px; justify-content: center; font-weight: bold; font-size: 22px; }

        .timer-box { background: #1a1a1a; min-width: 130px; justify-content: center; font-family: 'Bebas Neue', cursive; font-size: 38px; color: white; position: relative; }
        #extra-time-label { position: absolute; bottom: -28px; right: 0; font-size: 18px; padding: 2px 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div id="scoreboard">
        <div class="logo-box" id="logo-box-l"><img id="logo-l" src=""></div>
        <div class="block team-name" id="name-l">LOCAL</div>
        <div class="block score-box" id="score-l">0</div>
        
        <div class="block period-box" id="period-ui">1T</div>

        <div class="block score-box" id="score-v">0</div>
        <div class="block team-name" id="name-v">VISITA</div>
        <div class="logo-box" id="logo-box-v"><img id="logo-v" src=""></div>
        
        <div class="block timer-box">
            <span id="clock">00:00</span>
            <div id="extra-time-label">+0</div>
        </div>
    </div>

    <script>
        const ID_UNICO = "marcador_oscar_pro_2024";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let seconds = 0, timerInterval = null, limitMin = 45, extraMin = 0;

        client.on('connect', () => client.subscribe(ID_UNICO));
        client.on('message', (topic, message) => {
            const { type, data } = JSON.parse(message.toString());
            if (type === 'update_info') applyUpdate(data);
            if (type === 'control_ui') {
                if(data.action === 'show') document.getElementById('scoreboard').classList.add('active');
                else document.getElementById('scoreboard').classList.remove('active');
            }
            if (type === 'control_clock') {
                if (data.command === 'start') startClock();
                if (data.command === 'stop') clearInterval(timerInterval);
                if (data.command === 'reset') { clearInterval(timerInterval); seconds = 0; updateClock(); }
            }
        });

        function applyUpdate(d) {
            // Local
            document.getElementById('name-l').innerText = d.nameL;
            document.getElementById('score-l').innerText = d.scoreL;
            document.getElementById('name-l').style.backgroundColor = d.bgL;
            document.getElementById('name-l').style.color = d.txtL;
            document.getElementById('score-l').style.backgroundColor = d.bgL;
            document.getElementById('score-l').style.color = d.txtL;
            updateLogo('l', d.logoL);

            // Visita
            document.getElementById('name-v').innerText = d.nameV;
            document.getElementById('score-v').innerText = d.scoreV;
            document.getElementById('name-v').style.backgroundColor = d.bgV;
            document.getElementById('name-v').style.color = d.txtV;
            document.getElementById('score-v').style.backgroundColor = d.bgV;
            document.getElementById('score-v').style.color = d.txtV;
            updateLogo('v', d.logoV);

            // Periodo
            const pUi = document.getElementById('period-ui');
            pUi.innerText = d.periodText;
            pUi.style.backgroundColor = d.periodBg;
            pUi.style.color = d.periodTxt;

            limitMin = parseInt(d.limit); extraMin = parseInt(d.extra);
            
            const ex = document.getElementById('extra-time-label');
            ex.innerText = `+${d.extra}`; ex.style.display = d.extra > 0 ? 'block' : 'none';
            ex.style.backgroundColor = d.periodBg; ex.style.color = d.periodTxt;
        }

        function updateLogo(team, url) {
            const box = document.getElementById(`logo-box-${team}`);
            const img = document.getElementById(`logo-${team}`);
            if(url && url.trim() !== "") { box.style.display = 'flex'; img.src = url; }
            else { box.style.display = 'none'; }
        }

        function startClock() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (seconds < (limitMin + extraMin) * 60) { seconds++; updateClock(); }
            }, 1000);
        }

        function updateClock() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }
    </script>
</body>
</html>
