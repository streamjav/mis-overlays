<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Roboto Condensed', sans-serif; }

        /* --- ESTILOS WEBRTC --- */
        #webrtc-container {
            position: absolute;
            display: none;
            z-index: -1; /* Detrás de los gráficos por defecto */
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            background: #000;
        }
        /* Clases de Posicionamiento */
        #webrtc-container.fullscreen { inset: 0; width: 100vw; height: 100vh; border-radius: 0; }
        #webrtc-container.pip-tr { top: 30px; right: 30px; width: 400px; height: 225px; border-radius: 15px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #webrtc-container.pip-br { bottom: 100px; right: 30px; width: 400px; height: 225px; border-radius: 15px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #webrtc-container.pip-tl { top: 30px; left: 30px; width: 400px; height: 225px; border-radius: 15px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #webrtc-container.pip-bl { bottom: 100px; left: 30px; width: 400px; height: 225px; border-radius: 15px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #webrtc-frame { width: 100%; height: 100%; border: none; display: block; }

        #scoreboard {
            position: absolute; top: 40px; left: 50px; display: flex; align-items: stretch; height: 55px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transform: translateY(-120px); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #scoreboard.active { transform: translateY(0); }
        .team-container { display: flex; align-items: stretch; flex-grow: 1; min-width: 180px; }
        .logo-box { background: white; width: 55px; min-width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .logo-box img { width: 85%; height: 85%; object-fit: contain; }
        .name-box { background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 15px; flex-grow: 1; font-size: 24px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .score-box { background: #e62020; color: white; width: 55px; display: flex; justify-content: center; align-items: center; font-size: 32px; font-family: 'Bebas Neue', sans-serif; font-weight: bold; border-bottom: 3px solid rgba(0,0,0,0.2); }

        .team-a .name-box { border-bottom-color: #e62020; }
        .team-b .name-box { border-bottom-color: #1f6feb; }
        .team-b .score-box { background: #1f6feb; }

        #timer-box { background: #2b2b2b; color: #ffcc00; display: flex; align-items: center; padding: 0 20px; font-family: 'Bebas Neue', sans-serif; font-size: 30px; border-left: 2px solid rgba(255,255,255,0.1); }

        .overlay-root { position: relative; width: 100vw; height: 100vh; }

        #zocalo-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0;
        }
        #zocalo-ui.active { transform: translateX(-50%) translateY(0); opacity: 1; }

        .z-main { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 10px; padding: 15px 25px; border-left: 8px solid #e62020; min-width: 500px; display: flex; align-items: center; gap: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .z-logo { width: 70px; height: 70px; object-fit: contain; }
        .z-content { display: flex; flex-direction: column; }
        .z-title { font-size: 32px; color: white; text-transform: uppercase; line-height: 1; margin-bottom: 5px; font-weight: 900; }
        .z-sub { font-size: 18px; color: #ccc; text-transform: uppercase; letter-spacing: 2px; }

        #ticker-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #e62020; color: white; display: none; align-items: center; overflow: hidden; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .ticker-wrap { display: flex; white-space: nowrap; animation: ticker-move linear infinite; }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        #soc-ui { position: absolute; bottom: 60px; right: 50px; display: none; }
        .soc-pill-main { background: white; padding: 8px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px; font-size: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .soc-box { background: #000; color: white; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        #bug-ui { position: absolute; top: 30px; right: 40px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .bug-pill { background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; backdrop-filter: blur(5px); }
        #live-ui { background: #e62020; border: none; }
    </style>
</head>
<body>

    <div class="overlay-root">
        <div id="webrtc-container" class="fullscreen">
            <iframe id="webrtc-frame" allow="autoplay; camera; microphone; fullscreen; display-capture"></iframe>
        </div>

        <div id="scoreboard">
            <div class="team-container team-a">
                <div class="logo-box"><img id="logo-a" src="" alt=""></div>
                <div class="name-box" id="name-a">LOCAL</div>
                <div class="score-box" id="score-a">0</div>
            </div>
            <div class="team-container team-b">
                <div class="score-box" id="score-b">0</div>
                <div class="name-box" id="name-b">VISITA</div>
                <div class="logo-box"><img id="logo-b" src="" alt=""></div>
            </div>
            <div id="timer-box">00:00</div>
        </div>

        <div id="zocalo-ui">
            <div class="z-main" id="z-bar">
                <img id="z-img" class="z-logo" src="" alt="" style="display:none;">
                <div class="z-content">
                    <div class="z-title" id="z-title-ui">TÍTULO PRINCIPAL</div>
                    <div class="z-sub" id="z-sub-ui">SUBTÍTULO DEL ZÓCALO</div>
                </div>
            </div>
        </div>

        <div id="ticker-ui"><div class="ticker-wrap" id="ticker-txt"></div></div>

        <div id="soc-ui" class="soc-pill-main"></div>

        <div id="bug-ui">
            <div id="live-ui" class="bug-pill" style="display:none;">• EN VIVO</div>
            <div id="clock-ui" class="bug-pill" style="display:none;">00:00:00</div>
        </div>
    </div>

    <script>
        const ID_UNICO = "SISTEMA_PRO_2024";
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        client.on('connect', () => client.subscribe(ID_UNICO));

        client.on('message', (topic, message) => {
            const { type, data } = JSON.parse(message.toString());

            if (type === 'score_update') applyScoreUpdate(data);
            if (type === 'timer_update') document.getElementById('timer-box').innerText = data.time;
            if (type === 'zocalo_update') applyZocaloUpdate(data);
            if (type === 'webrtc_update') applyWebRTCUpdate(data);
        });

        function applyScoreUpdate(d) {
            const sc = document.getElementById('scoreboard');
            if (d.visible) sc.classList.add('active'); else sc.classList.remove('active');
            
            document.getElementById('name-a').innerText = d.teamA.name;
            document.getElementById('score-a').innerText = d.teamA.score;
            document.getElementById('logo-a').src = d.teamA.logo;
            document.getElementById('logo-a').style.display = d.teamA.logo ? 'block' : 'none';

            document.getElementById('name-b').innerText = d.teamB.name;
            document.getElementById('score-b').innerText = d.teamB.score;
            document.getElementById('logo-b').src = d.teamB.logo;
            document.getElementById('logo-b').style.display = d.teamB.logo ? 'block' : 'none';
        }

        let currentWebRTCUrl = "";
        function applyWebRTCUpdate(d) {
            const container = document.getElementById('webrtc-container');
            const frame = document.getElementById('webrtc-frame');

            if (d.visible && d.url && d.url.trim() !== "") {
                if (currentWebRTCUrl !== d.url) {
                    frame.src = d.url;
                    currentWebRTCUrl = d.url;
                }
                container.className = d.layout;
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
                frame.src = "";
                currentWebRTCUrl = "";
            }
        }

        function applyZocaloUpdate(data) {
            const { lt, ticker, logo, social, bug } = data;
            const ui = document.getElementById('zocalo-ui');
            const esc = (t) => t.replace(/&/g, "&amp;").replace(/</g, "&lt;");

            if (lt.visible) ui.classList.add('active'); else ui.classList.remove('active');

            document.getElementById('z-title-ui').innerText = lt.title;
            document.getElementById('z-sub-ui').innerText = lt.subtitle;
            document.getElementById('z-bar').style.borderLeftColor = lt.color;
            document.getElementById('zocalo-ui').style.transform = `translateX(-50%) scale(${lt.scale/100})`;

            const zImg = document.getElementById('z-img');
            if (logo.url) { zImg.src = logo.url; zImg.style.display = 'block'; } else { zImg.style.display = 'none'; }

            const socWrap = document.getElementById('soc-ui');
            if (social.visible) {
                socWrap.style.display = 'flex';
                let netText = social.net.toUpperCase();
                socWrap.innerHTML = `<div class="soc-box">${netText}</div><b>${esc(social.handle)}</b>`;
            } else {
                socWrap.style.display = 'none';
            }

            const tickerUI = document.getElementById('ticker-ui');
            if (ticker.visible) {
                tickerUI.style.display = 'flex';
                document.getElementById('ticker-txt').innerText = ((ticker.text || '') + " • ").repeat(10);
                document.getElementById('ticker-txt').style.animationDuration = `${Number(ticker.speed || 25)}s`;
            } else {
                tickerUI.style.display = 'none';
            }

            document.getElementById('live-ui').style.display = bug.showLive ? 'block' : 'none';
            document.getElementById('clock-ui').style.display = bug.showClock ? 'block' : 'none';
        }

        setInterval(() => {
            document.getElementById('clock-ui').innerText = new Date().toLocaleTimeString('es-ES', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
