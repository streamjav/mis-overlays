<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
.webrtc-shell {
    position:absolute;
    background:#000;
    overflow:hidden;
    border-radius:18px;
    opacity:0;
    transition:opacity .4s ease;
}
.webrtc-shell.visible{opacity:1;}
.webrtc-shell iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>
<body>

<div id="webrtc-stage"></div>

<script>
const ID_UNICO = "marcador_oscar_pro_2024";
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

let webrtcState = {
    url:"",
    visible:false,
    position:"br",
    width:420,
    height:236
};

function cleanNoAudio(url){
    return url.replace(/([&?])noaudio\b/g,'')
              .replace(/\?&/,'?')
              .replace(/&&/g,'&');
}

function addNoAudio(url){
    if(url.includes("noaudio")) return url;
    return url.includes("?") ? url+"&noaudio" : url+"?noaudio";
}

function ensureShell(){
    let shell = document.getElementById("webrtc-shell");
    if(shell) return shell;

    shell = document.createElement("div");
    shell.id="webrtc-shell";
    shell.className="webrtc-shell";

    shell.innerHTML=`<iframe id="webrtc-iframe" allow="autoplay"></iframe>`;

    document.getElementById("webrtc-stage").appendChild(shell);
    return shell;
}

function positionShell(shell){
    const margin=40;
    const w=webrtcState.width;
    const h=webrtcState.height;

    if(webrtcState.position==="tr"){
        shell.style.top=margin+"px";
        shell.style.left=(window.innerWidth-w-margin)+"px";
    }
    if(webrtcState.position==="tl"){
        shell.style.top=margin+"px";
        shell.style.left=margin+"px";
    }
    if(webrtcState.position==="bl"){
        shell.style.top=(window.innerHeight-h-margin)+"px";
        shell.style.left=margin+"px";
    }
    if(webrtcState.position==="br"){
        shell.style.top=(window.innerHeight-h-margin)+"px";
        shell.style.left=(window.innerWidth-w-margin)+"px";
    }

    shell.style.width=w+"px";
    shell.style.height=h+"px";
}

function renderWebRTC(){
    if(!webrtcState.url) return;

    const shell = ensureShell();
    const iframe = document.getElementById("webrtc-iframe");

    positionShell(shell);

    let url = cleanNoAudio(webrtcState.url);

    if(!webrtcState.visible){
        url = addNoAudio(url);
        shell.classList.remove("visible");
    }else{
        shell.classList.add("visible");
    }

    if(iframe.src !== url){
        iframe.src = url;
    }
}

function applyWebRTC(data){
    if(data.url !== undefined) webrtcState.url = data.url;
    if(data.visible !== undefined) webrtcState.visible = data.visible;
    if(data.position) webrtcState.position = data.position;

    renderWebRTC();
}

client.on('connect',()=>client.subscribe(ID_UNICO));

client.on('message',(t,m)=>{
    let msg;
    try{ msg = JSON.parse(m.toString()); }catch(e){ return; }

    if(['webrtc_update','webrtc_control','webrtc_state'].includes(msg.type)){
        applyWebRTC(msg.data || msg);
    }
});

window.onresize = renderWebRTC;
</script>

</body>
</html>
