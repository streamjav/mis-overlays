<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: transparent; 
            overflow: hidden; 
            font-family: 'Oswald', sans-serif; 
            margin: 0;
        }

        /* Contenedor principal del Lower Third */
        .lt-container {
            position: absolute;
            bottom: 80px;
            left: 50px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lt-container.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Fila del Título (Principal) */
        .lt-main {
            background: #ffffff;
            color: #1a1a1a;
            padding: 5px 25px;
            font-size: 32px;
            text-transform: uppercase;
            border-left: 12px solid #e74c3c; /* Color de acento */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            display: inline-block;
            width: fit-content;
        }

        /* Fila del Subtítulo */
        .lt-sub {
            background: #e74c3c;
            color: white;
            padding: 3px 20px;
            font-size: 18px;
            width: fit-content;
            margin-top: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="lower-third" class="lt-container">
        <div class="lt-main" id="txt-title">TITULO PRINCIPAL</div>
        <div class="lt-sub" id="txt-sub">DESCRIPCIÓN O SUBTÍTULO</div>
    </div>

    <script>
        const bc = new BroadcastChannel('overlay_channel');

        bc.onmessage = (event) => {
            const { action, title, sub, color } = event.data;
            
            if (action === 'show') {
                document.getElementById('txt-title').innerText = title;
                document.getElementById('txt-sub').innerText = sub;
                // Opcional: cambiar el color de acento
                document.getElementById('txt-sub').style.backgroundColor = color;
                document.getElementById('txt-title').style.borderLeftColor = color;
                
                document.getElementById('lower-third').classList.add('active');
            } else {
                document.getElementById('lower-third').classList.remove('active');
            }
        };
    </script>
</body>
</html>
