<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: rgba(10, 10, 10, 0.95); --accent: #00ff88; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Roboto Condensed', sans-serif; }
        
        #scoreboard {
            position: absolute; top: 40px; left: 50px; display: flex; align-items: stretch; height: 55px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transform: translateY(-120px); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #scoreboard.active { transform: translateY(0); }
        .block { background: var(--bg-dark); display: flex; align-items: center; color: white; padding: 0 15px; border-right: 1px solid var(--glass); }
        
        /* CONTENEDOR DE LOGO AJUSTADO */
        .logo-box { 
            background: white; 
            padding: 0; 
            display: none; /* Se activa por JS */
            justify-content: center; 
            align-items: center; 
            width: 55px; /* Tamaño fijo igual a la altura del marcador */
            min-width: 55px;
            height: 55px;
            overflow: hidden;
        }
        
        /* IMAGEN AJUSTADA PARA NO CORTARSE */
        .logo-box img { 
            width: 90%;  /* Pequeño margen interno para que respire el logo */
            height: 90%; 
            object-fit: contain; /* ESTA ES LA CLAVE: Ajusta la imagen completa sin cortes */
        }
        
        .team-name { font-size: 24px; text-transform: uppercase; min-width: 120px; justify-content: center; letter-spacing: 1px; flex-grow: 1; }
        
        .score-box { background: var(--accent); color: black; font-size: 36px; font-weight: 900; width: 60px; justify-content: center; position: relative; }
        #score-l { border-right: 2px solid rgba(255,255,255,0.5); }
        
        .timer-box { background: #1a1a1a; min-width: 130px; justify-content: center; font-family: 'Bebas Neue', cursive; font-size: 38px; position: relative; border-right: none; }
        #extra-time-label { position: absolute; bottom: -28px; right: 0; background: var(--accent); color: black; font-size: 18px; padding: 2px 10px; font-weight: bold; display: none; }
        .separator { width: 4px; background: var(--accent); }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="logo-box" id="logo-box-l"><img id="logo-l" src="" alt="" onerror="hideLogo('l')"></div>
        <div class="block team-name" id="name-l">LOCAL</div>
        <div class="block score-box" id="score-l">0</div>
        
        <div class="block score-box" id="score-v">0</div>
        <div class="block team-name" id="name-v">VISITA</div>
        <div class="logo-box" id="logo-box-v"><img id="logo-v" src="" alt="" onerror="hideLogo('v')"></div>
        
        <div class="block timer-box">
            <span id="clock">00:00</span>
            <div id="extra-time-label">+0</div>
        </div>
    </div>

    <script>
        const ID_UNICO = "marcador_oscar_pro_2024";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let seconds = 0; let timerInterval = null; let limitMinutes = 45; let extraMinutes = 0;

        window.onload = () => {
            const saved = localStorage.getItem(ID_UNICO + "_output");
            if(saved) applyData(JSON.parse(saved));
        };

        client.on('connect', () => { client.subscribe(ID_UNICO); });

        client.on('message', (topic, message) => {
            const msg = JSON.parse(message.toString());
            if (msg.type === 'update_info') {
                applyData(msg.data);
                localStorage.setItem(ID_UNICO + "_output", JSON.stringify(msg.data));
            }
            if (msg.type === 'control_ui') {
                if(msg.data.action === 'show') document.getElementById('scoreboard').classList.add('active');
                else document.getElementById('scoreboard').classList.remove('active');
            }
            if (msg.type === 'control_clock') {
                if (msg.data.command === 'start') startClock();
                if (msg.data.command === 'stop') clearInterval(timerInterval);
                if (msg.data.command === 'reset') resetClock();
            }
        });

        function applyData(data) {
            document.getElementById('name-l').innerText = data.nameL;
            document.getElementById('name-v').innerText = data.nameV;
            document.getElementById('score-l').innerText = data.scoreL;
            document.getElementById('score-v').innerText = data.scoreV;
            
            updateLogo('l', data.logoL);
            updateLogo('v', data.logoV);
            
            document.documentElement.style.setProperty('--accent', data.color);
            limitMinutes = parseInt(data.limit);
            extraMinutes = parseInt(data.extra);
            updateExtraLabel();
        }

        function updateLogo(team, url) {
            const logoBox = document.getElementById('logo-box-' + team);
            const logoImg = document.getElementById('logo-' + team);
            if (!url || url.trim() === '') {
                logoBox.style.display = 'none';
                logoImg.src = '';
            } else {
                logoBox.style.display = 'flex';
                logoImg.src = url;
            }
        }

        function hideLogo(team) {
            document.getElementById('logo-box-' + team).style.display = 'none';
        }

        function updateExtraLabel() {
            const extraLabel = document.getElementById('extra-time-label');
            if (extraMinutes > 0) {
                extraLabel.innerText = `+${extraMinutes}`;
                extraLabel.style.display = 'block';
            } else { extraLabel.style.display = 'none'; }
        }

        function startClock() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const totalLimitSeconds = (limitMinutes + extraMinutes) * 60;
                if (seconds < totalLimitSeconds) { seconds++; updateClockDisplay(); } 
                else { clearInterval(timerInterval); }
            }, 1000);
        }

        function resetClock() { clearInterval(timerInterval); seconds = 0; updateClockDisplay(); }
        function updateClockDisplay() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }
    </script>
</body>
</html>
